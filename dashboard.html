<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Dashboard Coach · Somos2os Studio</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="shortcut icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-pwa.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Asesorías S2">
  <meta name="theme-color" content="#7A2C9E">
  <meta name="application-name" content="Asesorías SomosDos">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; max-width: 100vw; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: url('assets/extraccion-form-bg.png') no-repeat center center fixed;
      background-size: cover;
      color: #e8edf8;
      -webkit-font-smoothing: antialiased;
    }

    .card-pad {
      background: rgba(8,12,48,0.72) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35) !important;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.35); border-radius: 8px; }

    .btn-primary {
      border: none; cursor: pointer;
      padding: 14px 30px; border-radius: 12px;
      background: linear-gradient(120deg, #3B82F6, #7B4EDB);
      color: #fff; font-size: 15.5px; font-weight: 700;
      box-shadow: 0 8px 28px rgba(123,78,219,0.45);
      transition: transform .18s ease;
      font-family: inherit;
    }
    .btn-primary:hover { transform: translateY(-2px); }

    .btn-secondary {
      border: 1.5px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.07); color: rgba(190,210,255,0.9);
      cursor: pointer; padding: 10px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 600; transition: background .15s ease;
      font-family: inherit;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); }

    .pill {
      display: inline-flex; align-items: center;
      padding: 5px 12px; border-radius: 99px;
      background: linear-gradient(135deg, #3B82F6, #7B4EDB);
      color: #fff; font-family: 'Sora', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: .04em;
      white-space: nowrap;
    }

    .pill-soft {
      display: inline-flex; align-items: center;
      padding: 5px 12px; border-radius: 99px;
      background: rgba(139,92,246,0.18);
      border: 1px solid rgba(139,92,246,0.3);
      color: #c4b5fd; font-size: 12px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase; white-space: nowrap;
    }

    input[type="password"], input[type="text"] {
      width: 100%; padding: 13px 15px;
      border: 1.5px solid rgba(139,92,246,0.3);
      border-radius: 14px; font-size: 15.5px;
      color: #fff; background: rgba(255,255,255,0.07);
      outline: none; font-family: inherit;
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    input::placeholder { color: rgba(180,200,255,0.4); }
    input:focus {
      border-color: rgba(139,92,246,0.7);
      box-shadow: 0 0 0 4px rgba(139,92,246,0.15);
      background: rgba(255,255,255,0.1);
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-8px); }
      40%,80%  { transform: translateX(8px); }
    }
    .shake { animation: shake .4s ease; }

    /* ── Animaciones de transición ── */
    @keyframes dashFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes dashSlideUp {
      from { opacity: 0; transform: translateY(24px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0)    scale(1);     }
    }
    @keyframes dashSlideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Wrapper de pantalla completa anima como fade */
    .dash-enter { animation: dashFadeIn 0.28s ease both; }

    /* Hijos directos de mob-wrap se escalonan */
    .dash-stagger > * {
      opacity: 0;
      animation: dashSlideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .dash-stagger > *:nth-child(1) { animation-delay:  20ms; }
    .dash-stagger > *:nth-child(2) { animation-delay:  80ms; }
    .dash-stagger > *:nth-child(3) { animation-delay: 140ms; }
    .dash-stagger > *:nth-child(4) { animation-delay: 200ms; }
    .dash-stagger > *:nth-child(5) { animation-delay: 260ms; }
    .dash-stagger > *:nth-child(6) { animation-delay: 320ms; }
    .dash-stagger > *:nth-child(7) { animation-delay: 380ms; }
    .dash-stagger > *:nth-child(8) { animation-delay: 440ms; }

    /* Cards en vistas de detalle también animan */
    .dash-cards > * {
      opacity: 0;
      animation: dashSlideUp 0.42s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .dash-cards > *:nth-child(1) { animation-delay:  60ms; }
    .dash-cards > *:nth-child(2) { animation-delay: 130ms; }
    .dash-cards > *:nth-child(3) { animation-delay: 200ms; }
    .dash-cards > *:nth-child(4) { animation-delay: 270ms; }
    .dash-cards > *:nth-child(5) { animation-delay: 340ms; }
    .dash-cards > *:nth-child(6) { animation-delay: 410ms; }

    /* ── Clases de texto para dark theme ── */
    .dk-label   { color: rgba(150,175,230,0.55) !important; }
    .dk-body    { color: rgba(190,210,250,0.85) !important; }
    .dk-heading { color: #e8edf8 !important; }
    .dk-muted   { color: rgba(140,165,220,0.5) !important; }
    .dk-divider { border-color: rgba(255,255,255,0.08) !important; }
    .dk-card    { background: rgba(255,255,255,0.05) !important; border-color: rgba(255,255,255,0.09) !important; }
    .dk-input   { background: rgba(255,255,255,0.07) !important; border-color: rgba(255,255,255,0.15) !important; color: #fff !important; }

    @media (max-width: 600px) {
      body {
        background: url('assets/extraccion-bg-mobile.png') no-repeat center top fixed !important;
        background-size: cover !important;
      }
      .dash-pill { display: none !important; }
      .dash-btn-text { display: none !important; }
      .btn-secondary { padding: 10px 12px !important; }
      .card-pad {
        padding: 18px 16px !important;
        background: rgba(8,12,48,0.78) !important;
        backdrop-filter: blur(16px) !important;
        -webkit-backdrop-filter: blur(16px) !important;
        border-radius: 18px !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
      }
      .card-pad h1 { font-size: 22px !important; color: #e8edf8 !important; }
      .card-pad h2 { font-size: 18px !important; color: #e8edf8 !important; }
      .mob-wrap { padding: max(16px, env(safe-area-inset-top)) 14px max(72px, env(safe-area-inset-bottom)) !important; }
      .mob-full { width: 100% !important; max-width: 100% !important; }
      /* Logo nítido en mobile — fuerza GPU layer para evitar blur del filter */
      img[alt="Somos2os Studio"] { transform: translateZ(0); -webkit-transform: translateZ(0); }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ─── CONFIGURACIÓN ────────────────────────────────────────────────────────────
const SUPABASE_URL      = 'https://qwmhflgtdvqoeuwboknw.supabase.co';
const SUPABASE_SERVICE  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3bWhmbGd0ZHZxb2V1d2Jva253Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTgzOTY0MSwiZXhwIjoyMDk3NDE1NjQxfQ.YlDNh1zomDGSGqCH6YyWfNsy1MbyHmgpY3J4DRerEDw';
const DASHBOARD_PASSWORD = 'somos2os2025'; // ← cambia esto

// ─── DATOS ────────────────────────────────────────────────────────────────────
const BLOCKS = [
  { title: 'Entender el negocio', time: 'Minuto 10 – 25', qs: [
    '¿Qué servicios ofreces actualmente?','¿Cuáles son los servicios que más disfrutas?',
    '¿Cuáles son los más rentables?','¿Cuáles son los casos que más te gustaría atraer?',
    '¿Hay algún tipo de cliente con el que prefieres trabajar?','¿Cuánto tiempo llevas ejerciendo?',
    '¿Qué te llevó a especializarte en migración?','¿Qué te diferencia de otros abogados migratorios?',
    '¿Qué tipo de resultados consigues para tus clientes?','¿Tienes algún caso de éxito que recuerdes especialmente?'
  ]},
  { title: 'Captación actual', time: 'Minuto 25 – 40', qs: [
    '¿Cómo consigues clientes actualmente?','¿Cuál es tu principal fuente de clientes?',
    '¿Cuántos clientes llegan por recomendación?','¿Cuántos llegan por redes sociales?',
    '¿Cuántos llegan por búsqueda en internet?','¿Cuántas consultas recibes aproximadamente al mes?',
    '¿Cuántas de esas consultas terminan convirtiéndose en clientes?','¿Tienes algún proceso de seguimiento?',
    '¿Guardas los datos de personas que preguntan pero no compran?',
    '¿Sientes que actualmente dependes demasiado de las referencias? ¿Por qué?'
  ]},
  { title: 'Marca personal y presencia digital', time: 'Minuto 40 – 55', qs: [
    '¿Qué redes sociales utilizas actualmente?','¿Cuál utilizas con mayor frecuencia?',
    '¿Publicas contenido? ¿Con qué frecuencia?','¿Qué tipo de contenido compartes?',
    '¿Qué publicaciones suelen funcionar mejor?','¿Qué publicaciones suelen funcionar peor?',
    '¿Te sientes cómoda grabando videos?','¿Qué es lo que más te cuesta de crear contenido?',
    '¿Qué te gustaría comunicar que actualmente no estás comunicando?',
    'Si alguien entra hoy a tus redes, ¿qué impresión crees que se lleva de ti?'
  ]},
  { title: 'Inteligencia Artificial y herramientas', time: 'Minuto 55 – 65', qs: [
    '¿Has utilizado ChatGPT alguna vez? ¿Pagas la suscripción o lo usas gratis?',
    '¿Para qué lo has utilizado?','¿Qué herramientas digitales utilizas normalmente?',
    '¿Qué tareas te consumen más tiempo?','¿Qué parte de tu trabajo te gustaría simplificar?',
    '¿Qué procesos te gustaría automatizar o hacer más rápidos?',
    { q: '¿Cuál sería tu nivel actual de conocimiento en IA del 1 al 10?', scale: true }
  ]},
  { title: 'Objetivos', time: 'Minuto 65 – 80', qs: [
    '¿Dónde te gustaría estar dentro de 3 meses?','¿Dónde te gustaría estar dentro de 6 meses?',
    '¿Dónde te gustaría estar dentro de 12 meses?','¿Cuántos clientes te gustaría tener al mes?',
    '¿Cuántas consultas te gustaría generar?',
    '¿Qué tendría que pasar para que dijeras: "Este acompañamiento valió completamente la pena"?',
    '¿Cuál es tu principal prioridad profesional en este momento?',
    '¿Cuál es el principal obstáculo que sientes que te está frenando?'
  ]}
];
const TAREA_LABELS = [
  { label: 'Perfil de Instagram', key: true },
  { label: 'Perfil de LinkedIn (si tiene)' },
  { label: 'Página web (si existe)' },
  { label: 'WhatsApp Business', key: true },
  { label: 'Materiales de presentación' },
  { label: 'Servicios actuales y precios', key: true },
  { label: 'Ejemplos de contenido previo' }
];

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let S = {
  auth: false,
  loading: false,
  records: [],
  extracciones: [],
  sesiones: [],
  selected: null,
  selectedExtraccion: null,
  tab: 'diagnosticos',
  linkTipo: 'diagnostico',
  error: null
};

// ─── API ──────────────────────────────────────────────────────────────────────
async function fetchRecords() {
  S.loading = true; render();
  try {
    const [resD, resS, resE] = await Promise.all([
      fetch(SUPABASE_URL + '/rest/v1/diagnosticos?select=*&order=created_at.desc',
        { headers: { 'apikey': SUPABASE_SERVICE, 'Authorization': 'Bearer ' + SUPABASE_SERVICE } }),
      fetch(SUPABASE_URL + '/rest/v1/link_sesiones?select=*&order=ultimo_acceso.desc',
        { headers: { 'apikey': SUPABASE_SERVICE, 'Authorization': 'Bearer ' + SUPABASE_SERVICE } }),
      fetch(SUPABASE_URL + '/rest/v1/extracciones?select=*&order=created_at.desc',
        { headers: { 'apikey': SUPABASE_SERVICE, 'Authorization': 'Bearer ' + SUPABASE_SERVICE } })
    ]);
    if (!resD.ok) throw new Error('Error ' + resD.status);
    S.records = await resD.json();
    S.sesiones = resS.ok ? await resS.json() : [];
    S.extracciones = resE.ok ? await resE.json() : [];
    S.error = null;
  } catch(e) {
    S.error = 'No se pudieron cargar las respuestas. Verifica la conexión.';
  } finally {
    S.loading = false; render();
  }
}

// ─── ACCIONES ─────────────────────────────────────────────────────────────────
window.tryLogin = function() {
  const val = document.getElementById('pwd-input').value;
  if (val === DASHBOARD_PASSWORD) {
    S.auth = true;
    try { localStorage.setItem('somos2os_admin_auth', '1'); } catch(e) {}
    render();
    fetchRecords();
  } else {
    const card = document.getElementById('login-card');
    if (card) { card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake'); }
    const hint = document.getElementById('pwd-hint');
    if (hint) { hint.textContent = 'Contraseña incorrecta'; hint.style.color = '#E05555'; }
  }
};

window.logout = function() {
  S.auth = false;
  S.records = [];
  S.selected = null;
  try { localStorage.removeItem('somos2os_admin_auth'); } catch(e) {}
  render();
};

window.pwdKeydown = function(e) { if (e.key === 'Enter') tryLogin(); };

window.togglePwd = function() {
  const input = document.getElementById('pwd-input');
  if (!input) return;
  input.type = input.type === 'password' ? 'text' : 'password';
};

window.openRecord = function(id) {
  S.selected = S.records.find(r => r.id === id) || null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.closeRecord = function() {
  S.selected = null; render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.deleteRecord = async function(id) {
  if (!confirm('¿Estás seguro de que deseas eliminar este diagnóstico? Esta acción no se puede deshacer.')) return;
  
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/diagnosticos?id=eq.' + id, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_SERVICE,
        'Authorization': 'Bearer ' + SUPABASE_SERVICE
      }
    });
    if (!res.ok) throw new Error('Error ' + res.status);
    
    if (S.selected && S.selected.id === id) {
      S.selected = null;
    }
    await fetchRecords();
  } catch(e) {
    alert('No se pudo eliminar el registro.');
  }
};

// ─── BORRAR SESIÓN ────────────────────────────────────────────────────────────
window.borrarSesion = async function(id) {
  try {
    await fetch(SUPABASE_URL + '/rest/v1/link_sesiones?id=eq.' + id, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_SERVICE, 'Authorization': 'Bearer ' + SUPABASE_SERVICE }
    });
    S.sesiones = S.sesiones.filter(s => s.id !== id);
    render();
  } catch(e) {}
};

// ─── RENOMBRAR CLIENTE ────────────────────────────────────────────────────────
window.editarNombre = function(id, currentName) {
  const overlay = document.createElement('div');
  overlay.id = 'rename-modal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(4,6,28,.6);backdrop-filter:blur(10px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `
    <div style="background:rgba(12,16,52,0.95);border:1px solid rgba(139,92,246,0.3);border-radius:20px;padding:30px 28px;width:100%;max-width:420px;box-shadow:0 30px 80px -10px rgba(0,0,0,0.6);">
      <h3 style="font-family:'Sora',sans-serif;font-size:18px;font-weight:700;color:#e8edf8;margin:0 0 6px;">Cambiar nombre</h3>
      <p style="font-size:13px;color:rgba(150,175,230,0.5);margin:0 0 18px;">Este cambio solo aplica en el dashboard, no afecta las respuestas.</p>
      <input id="rename-input" type="text" value="${esc(currentName)}" placeholder="Nombre del cliente…"
        style="width:100%;box-sizing:border-box;padding:12px 14px;font-size:15px;border-radius:12px;border:1.5px solid rgba(139,92,246,0.3);background:rgba(255,255,255,0.07);color:#e8edf8;font-family:inherit;outline:none;margin-bottom:16px;"
        onfocus="this.style.borderColor='rgba(139,92,246,0.7)';this.style.boxShadow='0 0 0 4px rgba(139,92,246,0.15)'" onblur="this.style.borderColor='rgba(139,92,246,0.3)';this.style.boxShadow='none'"
        onkeydown="if(event.key==='Enter')guardarNombre('${id}');if(event.key==='Escape')document.getElementById('rename-modal').remove()">
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button onclick="document.getElementById('rename-modal').remove()" class="btn-secondary">Cancelar</button>
        <button onclick="guardarNombre('${id}')" style="padding:10px 20px;background:linear-gradient(120deg,#3B82F6,#7B4EDB);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Guardar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('rename-input')?.focus(), 50);
};

window.guardarNombre = async function(id) {
  const input = document.getElementById('rename-input');
  const newName = input?.value?.trim();
  if (!newName) return;
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/diagnosticos?id=eq.' + id, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_SERVICE,
        'Authorization': 'Bearer ' + SUPABASE_SERVICE,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ cliente: newName })
    });
    if (!res.ok) throw new Error();
    const r = S.records.find(r => r.id === id);
    if (r) r.cliente = newName;
    if (S.selected?.id === id) S.selected.cliente = newName;
    document.getElementById('rename-modal')?.remove();
    render();
  } catch(e) {
    alert('No se pudo actualizar el nombre.');
  }
};

// ─── REDES SOCIALES ───────────────────────────────────────────────────────────

    { key: 'facebook',  label: 'Facebook',   color: '#1877F2', bg: 'rgba(24,119,242,0.12)', border: 'rgba(24,119,242,0.3)',
      icon: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>' },
    { key: 'web',       label: 'Página web', color: '#3B82F6', bg: 'rgba(59,130,246,0.12)', border: 'rgba(59,130,246,0.3)',

window.guardarRedesSociales = async function(id) {
  const r = S.records.find(rec => rec.id === id);
  if (!r) return;
  const social = {
    instagram: document.getElementById('social-instagram')?.value.trim() || '',
    tiktok:    document.getElementById('social-tiktok')?.value.trim()    || '',
    facebook:  document.getElementById('social-facebook')?.value.trim()  || '',
    web:       document.getElementById('social-web')?.value.trim()       || '',
    whatsapp:  document.getElementById('social-whatsapp')?.value.trim()  || ''
  };
  const newAnswers = { ...(r.answers || {}), _social: social };
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/diagnosticos?id=eq.' + id, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_SERVICE,
        'Authorization': 'Bearer ' + SUPABASE_SERVICE,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ answers: newAnswers })
    });
    if (!res.ok) throw new Error();
    r.answers = newAnswers;
    if (S.selected?.id === id) S.selected.answers = newAnswers;
    document.getElementById('social-modal')?.remove();
    render();
  } catch(e) {
    alert('No se pudieron guardar las redes sociales.');
  }
};

// ─── UTILIDADES ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const fecha = d.toLocaleDateString('es-ES', { day: '2-digit', month: 'long', year: 'numeric' });
  const hora = d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', hour12: true });
  return `${fecha} a las ${hora}`;
}

function countAnswered(answers) {
  if (!answers) return 0;
  return Object.entries(answers).filter(([k, v]) => !k.startsWith('_') && v !== '' && v !== undefined && v !== null).length;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');

  const doRender = () => {
    app.style.cssText = '';
    if (!S.auth)                  app.innerHTML = buildLogin();
    else if (S.selected)          app.innerHTML = buildDetail();
    else if (S.selectedExtraccion) app.innerHTML = buildDetailExtraccion();
    else                          app.innerHTML = buildList();
    app.classList.add('dash-enter');
    setTimeout(() => app.classList.remove('dash-enter'), 400);
  };

  if (app.children.length > 0) {
    app.style.transition = 'opacity 0.15s ease, transform 0.15s ease';
    app.style.opacity = '0';
    app.style.transform = 'translateY(-10px)';
    setTimeout(doRender, 160);
  } else {
    doRender();
  }
}

window.openExtraccion = function(id) {
  S.selectedExtraccion = S.extracciones.find(r => r.id === id) || null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.closeExtraccion = function() {
  S.selectedExtraccion = null;
  S.tab = 'extracciones';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.deleteExtraccion = async function(id) {
  if (!confirm('¿Eliminar esta extracción de conocimiento? No se puede deshacer.')) return;
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/extracciones?id=eq.' + id, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_SERVICE, 'Authorization': 'Bearer ' + SUPABASE_SERVICE }
    });
    if (!res.ok) throw new Error();
    if (S.selectedExtraccion?.id === id) S.selectedExtraccion = null;
    await fetchRecords();
  } catch(e) { alert('No se pudo eliminar.'); }
};

        ? S.extracciones.some(e => (e.cliente || '').toLowerCase() === (ses.cliente || '').toLowerCase())

      const EXT_SECTIONS = ['Preguntas', 'Dudas', 'Errores', 'Casos', 'Conocimiento'];

      if (enviado) {

        if (diff < 1440) return `hace ${Math.round(diff/60)}h`;

  const tabs = `

    <button onclick="setTab('extracciones')" style="flex:1;padding:11px;border-radius:12px;border:1.5px solid ${S.tab==='extracciones'?'rgba(139,92,246,0.7)':'rgba(255,255,255,0.12)'};background:${S.tab==='extracciones'?'rgba(139,92,246,0.18)':'rgba(255,255,255,0.05)'};font-size:13px;font-weight:700;color:${S.tab==='extracciones'?'#c4b5fd':'rgba(190,210,255,0.5)'};cursor:pointer;transition:all .15s;font-family:inherit;">
      Extracciones <span style="font-size:11px;background:${S.tab==='extracciones'?'rgba(139,92,246,0.4)':'rgba(255,255,255,0.1)'};color:${S.tab==='extracciones'?'#e9d5ff':'rgba(190,210,255,0.5)'};padding:1px 7px;border-radius:99px;margin-left:4px;">${S.extracciones.length}</span>
    </button>
  </div>`;

  // ── Tab Diagnósticos ──
  if (S.tab === 'diagnosticos') {
    if (S.records.length === 0) {
      return wrap(header + linkCard + sesionesHTML + tabs + `
      <div class="card-pad mob-full" style="width:100%;max-width:820px;border-radius:20px;padding:48px;text-align:center;">
        <div style="font-size:32px;margin-bottom:12px;">📋</div>
        <p style="font-size:16px;color:rgba(180,200,255,0.65);margin:0;">Aún no hay respuestas enviadas.</p>
      </div>`);
    }
    const cards = S.records.map(r => {
      const answered  = countAnswered(r.answers);
      const total     = 45;
      const pct       = Math.round((answered / total) * 100);
      const tareaCount = r.tarea ? Object.values(r.tarea).filter(Boolean).length : 0;
      return `
      <div onclick="openRecord('${r.id}')" class="card-pad" style="border-radius:20px;padding:24px 28px;cursor:pointer;transition:box-shadow .2s ease,transform .2s ease,background .2s ease;"
        onmouseover="this.style.background='rgba(139,92,246,0.12)';this.style.transform='translateY(-2px)'"
        onmouseout="this.style.background='';this.style.transform='translateY(0)'">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;">

        </div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;">
          <span style="font-size:13px;font-weight:600;color:rgba(190,210,255,0.75);">✏️ ${answered} de ${total} preguntas</span>
          <span style="font-size:13px;font-weight:600;color:rgba(190,210,255,0.75);">✓ ${tareaCount} de 7 materiales</span>
        </div>
      </div>`;
    }).join('');
    const countLabel = `<p style="font-size:13px;color:rgba(150,175,230,0.5);margin:0 0 16px;">${S.records.length} diagnóstico${S.records.length !== 1 ? 's' : ''} recibido${S.records.length !== 1 ? 's' : ''}</p>`;

  // ── Tab Extracciones ──
  if (S.extracciones.length === 0) {
    return wrap(header + linkCard + tabs + `
    <div class="card-pad mob-full" style="width:100%;max-width:820px;border-radius:20px;padding:48px;text-align:center;">
      <div style="font-size:32px;margin-bottom:12px;">🧠</div>
      <p style="font-size:16px;color:rgba(180,200,255,0.65);margin:0;">Aún no hay extracciones enviadas.</p>
    </div>`);
  }
  const extCards = S.extracciones.map(r => {
    const answered = Object.values(r.answers || {}).filter(v => v).length;
    return `
    <div onclick="openExtraccion('${r.id}')" class="card-pad" style="border-radius:20px;padding:24px 28px;cursor:pointer;transition:box-shadow .2s ease,transform .2s ease,background .2s ease;"

      onmouseout="this.style.background='';this.style.transform='translateY(0)'">

          <h3 style="font-family:'Sora',sans-serif;font-size:18px;font-weight:700;margin:0 0 4px;color:#e8edf8;">${esc(r.cliente || 'Sin nombre')}</h3>
          <p style="font-size:13px;color:rgba(150,175,230,0.55);margin:0;">${formatDate(r.created_at)}</p>

      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <span style="font-size:12px;color:rgba(190,210,255,0.6);background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);padding:4px 10px;border-radius:8px;">Preguntas Frecuentes</span>

      </div>
    </div>`;
  }).join('');
  const extLabel = `<p style="font-size:13px;color:rgba(150,175,230,0.5);margin:0 0 16px;">${S.extracciones.length} extracción${S.extracciones.length !== 1 ? 'es' : ''} recibida${S.extracciones.length !== 1 ? 's' : ''}</p>`;
  return wrap(header + linkCard + tabs + extLabel + `<div class="mob-full" style="width:100%;max-width:820px;display:flex;flex-direction:column;gap:14px;">${extCards}</div>`);
}

// ── DETALLE EXTRACCIÓN ──
function buildDetailExtraccion() {
  const r = S.selectedExtraccion;
  if (!r) return buildList();

  const answers = r.answers || {};

  const blockDefs = [
    { prefix: 's1', title: 'Preguntas Frecuentes',   tag: 'Sección 1 · 5', color: '#2E72D8', tipo: 'lista',   count: 15 },
    { prefix: 's2', title: 'Dudas Comunes',           tag: 'Sección 2 · 5', color: '#5A45C4', tipo: 'lista',   count: 15 },
    { prefix: 's3', title: 'Errores Comunes',         tag: 'Sección 3 · 5', color: '#7A2C9E', tipo: 'lista',   count: 15 },
    {               title: 'Casos Reales',            tag: 'Sección 4 · 5', color: '#2E72D8', tipo: 'casos',
      casos: [
        { num: 1, label: 'Caso 1', qs: ['¿Cuál era la situación inicial del cliente? ¿De dónde venía?', '¿Cuál era el problema principal que enfrentaba?', '¿Cómo trabajaste con él/ella? ¿Qué hiciste?', '¿Cuál fue el resultado final?'] },
        { num: 2, label: 'Caso 2', qs: ['¿Cuál era la situación inicial del cliente? ¿De dónde venía?', '¿Cuál era el problema principal que enfrentaba?', '¿Cómo trabajaste con él/ella? ¿Qué hiciste?', '¿Cuál fue el resultado final?'] },
        { num: 3, label: 'Caso 3', qs: ['¿Cuál era la situación inicial del cliente? ¿De dónde venía?', '¿Cuál era el problema principal que enfrentaba?', '¿Cómo trabajaste con él/ella? ¿Qué hiciste?', '¿Cuál fue el resultado final?'] }
      ]
    },
    { prefix: 's5', title: 'Conocimiento Experto',   tag: 'Sección 5 · 5', color: '#7A2C9E', tipo: 'normal',
      qs: ['¿Qué errores ves constantemente en tu industria que a ti ya no te sorprenden?', '¿Qué información incorrecta circula en tu industria que sabes que es falsa?', '¿Qué mitos existen sobre tu trabajo o el proceso que ayudas a resolver?', '¿Qué 3 consejos le darías a alguien que está comenzando a buscar soluciones?', '¿Qué te hubiera gustado saber antes de empezar en este camino profesional?']
    }
  ];

  let totalAnswered = 0, totalQ = 0;
  ['s1','s2','s3'].forEach(p => { for (let i=0;i<15;i++) { totalQ++; if(answers[p+'_q'+i]) totalAnswered++; } });
  for (let c=1;c<=3;c++) { for (let q=0;q<4;q++) { totalQ++; if(answers['c'+c+'_q'+q]) totalAnswered++; } }
  for (let i=0;i<5;i++) { totalQ++; if(answers['s5_q'+i]) totalAnswered++; }
  const pct = Math.round((totalAnswered / totalQ) * 100);

  const blocksHTML = blockDefs.map(blk => {
    let contentHTML = '';
    if (blk.tipo === 'lista') {
      const items = [];
      for (let i=0;i<blk.count;i++) {
        const val = answers[blk.prefix+'_q'+i];
        if (val) items.push(`
          <div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.07);align-items:flex-start;">
            <div style="flex:none;width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,${blk.color},#7B4EDB);color:#fff;font-family:'Sora',sans-serif;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;">${i+1}</div>
            <p style="margin:0;font-size:15px;line-height:1.5;color:#e8edf8;white-space:pre-wrap;">${esc(String(val))}</p>
          </div>`);
      }
      contentHTML = items.length === 0
        ? `<p style="font-size:14px;color:rgba(150,175,230,0.4);font-style:italic;margin:0;">(sin respuestas)</p>`
        : `<div style="display:flex;flex-direction:column;">${items.join('')}</div>`;
    } else if (blk.tipo === 'casos') {
      contentHTML = blk.casos.map(caso => {
        const qsHTML = caso.qs.map((q, qi) => {
          const val = answers['c'+caso.num+'_q'+qi];
          return `
          <div style="margin-bottom:14px;">
            <p style="font-size:12px;font-weight:700;color:rgba(150,175,230,0.5);margin:0 0 6px;text-transform:uppercase;letter-spacing:.06em;">${esc(q)}</p>
            ${!val
              ? `<p style="margin:0;font-size:14px;color:rgba(150,175,230,0.35);font-style:italic;">(sin respuesta)</p>`
              : `<div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-left:3px solid ${blk.color};border-radius:8px 14px 14px 8px;padding:12px 16px;"><p style="margin:0;font-size:15px;line-height:1.6;color:#e8edf8;white-space:pre-wrap;">${esc(String(val))}</p></div>`
            }
          </div>`;
        }).join('');
        return `
        <div style="border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px 20px;background:rgba(255,255,255,0.04);margin-bottom:12px;">
          <div style="font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:${blk.color};margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em;">${caso.label}</div>
          ${qsHTML}
        </div>`;
      }).join('');
    } else {
      const qsHTML = blk.qs.map((q, qi) => {
        const val = answers[blk.prefix+'_q'+qi];
        return `
        <div style="display:flex;flex-direction:column;gap:8px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.07);">
          <div style="display:flex;align-items:flex-start;gap:10px;">
            <div style="flex:none;width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,${blk.color},#7B4EDB);color:#fff;font-family:'Sora',sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;">${qi+1}</div>
            <p style="margin:0;font-size:15px;font-weight:600;color:rgba(190,210,255,0.75);line-height:1.4;">${esc(q)}</p>
          </div>
          <div style="margin-left:36px;">
            ${!val
              ? `<div style="background:rgba(255,255,255,0.04);border:1.5px dashed rgba(255,255,255,0.12);border-radius:12px;padding:12px 18px;"><p style="margin:0;font-size:14px;color:rgba(150,175,230,0.35);font-style:italic;">(sin respuesta)</p></div>`
              : `<div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-left:3px solid ${blk.color};border-radius:8px 14px 14px 8px;padding:14px 18px;"><p style="margin:0;font-size:15px;line-height:1.6;color:#e8edf8;white-space:pre-wrap;font-weight:500;">${esc(String(val))}</p></div>`
            }
          </div>
        </div>`;
      }).join('');
      contentHTML = `<div style="display:flex;flex-direction:column;gap:0;">${qsHTML}</div>`;
    }
    return `
    <div class="card-pad" style="border-radius:20px;padding:28px 32px;">
      <div style="margin-bottom:6px;"><div class="pill" style="font-size:12px;">${esc(blk.tag)}</div></div>
      <h2 style="font-family:'Sora',sans-serif;font-size:22px;font-weight:700;letter-spacing:-.02em;margin:8px 0 22px;color:#e8edf8;">${esc(blk.title)}</h2>
      ${contentHTML}
    </div>`;
  }).join('');

  return wrap(`
  <div class="mob-full" style="width:100%;max-width:820px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;">
      <img src="assets/logo-somos2os.png" alt="Somos2os Studio" style="height:30px;width:auto;filter:brightness(0) invert(1);">
      <div style="display:flex;align-items:center;gap:10px;">
        <button onclick="closeExtraccion()" class="btn-secondary" style="display:flex;align-items:center;gap:6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          <span class="dash-btn-text">Volver</span>
        </button>
        <button onclick="mostrarPreviaPDF('extraccion')" class="btn-secondary" style="display:flex;align-items:center;gap:6px;color:#93c5fd;border-color:rgba(147,197,253,0.3);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          <span class="dash-btn-text">Exportar PDF</span>
        </button>
        <button onclick="deleteExtraccion('${r.id}')" class="btn-secondary" style="display:flex;align-items:center;gap:6px;color:#f87171;border-color:rgba(248,113,113,0.3);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          <span class="dash-btn-text">Eliminar</span>
        </button>
        <button onclick="logout()" class="btn-secondary" style="display:flex;align-items:center;gap:6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          <span class="dash-btn-text">Cerrar sesión</span>
        </button>
      </div>
    </div>

    <div class="card-pad" style="border-radius:20px;padding:28px 32px;margin-bottom:20px;">
      <div class="pill-soft" style="margin-bottom:14px;">Extracción de Conocimiento Experto</div>
      <h1 style="font-family:'Sora',sans-serif;font-size:28px;font-weight:700;letter-spacing:-.02em;margin:0 0 6px;background:linear-gradient(120deg,#3B82F6,#7B4EDB);-webkit-background-clip:text;background-clip:text;color:transparent;">${esc(r.cliente || 'Cliente')}</h1>
      <p style="font-size:14px;color:rgba(150,175,230,0.55);margin:0 0 20px;">${formatDate(r.created_at)}</p>
      <div style="height:8px;width:100%;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden;margin-bottom:10px;">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#3B82F6,#7B4EDB);border-radius:99px;transition:width .45s ease;"></div>
      </div>
      <p style="font-size:13px;color:rgba(150,175,230,0.5);margin:0;">${totalAnswered} de ${totalQ} preguntas respondidas · ${pct}% completado</p>
    </div>

    <div class="dash-cards" style="display:flex;flex-direction:column;gap:16px;margin-bottom:16px;">${blocksHTML}</div>

    <div style="margin-top:24px;text-align:center;">
      <button onclick="closeExtraccion()" class="btn-secondary">← Volver a la lista</button>
    </div>
  </div>`);
}

// ── DETALLE ──
function buildDetail() {
  const r = S.selected;
  if (!r) return buildList();

  const answers = r.answers || {};
  const tarea   = r.tarea   || {};

  const blocksHTML = BLOCKS.map((blk, bi) => {
    const qsHTML = blk.qs.map((raw, i) => {
      const isScale = typeof raw === 'object' && raw.scale;
      const text    = typeof raw === 'string' ? raw : raw.q;
      const id      = 'b' + bi + '_q' + i;
      const val     = answers[id];
      const empty   = val === undefined || val === '' || val === null;

      let answerHTML;
      if (isScale) {
        const num = empty ? '—' : Number(val);
        const pct = empty ? 0 : ((Number(val) - 1) / 9) * 100;
        answerHTML = `
        <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 18px;">
          <div style="display:flex;align-items:center;gap:16px;">
            <span style="font-family:'Sora',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(120deg,#3B82F6,#7B4EDB);-webkit-background-clip:text;background-clip:text;color:transparent;">${num}</span>
            <div style="flex:1;height:6px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden;">
              <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#3B82F6,#7B4EDB);border-radius:99px;"></div>
            </div>

const FORM_BASE_URL = 'https://formularios.somosdostudio.com';


function buildLink(sid) {
  const nombre = (document.getElementById('link-nombre')?.value || '').trim();
  if (!nombre) return '';
  if (S.linkTipo === 'extraccion') {
    let url = FORM_BASE_URL + '/extraccion?cliente=' + encodeURIComponent(nombre);
    if (sid) url += '&sid=' + sid;
    return url;
  }
  let url = FORM_BASE_URL + '?cliente=' + encodeURIComponent(nombre);
  if (sid) url += '&sid=' + sid;
  return url;
}

window.actualizarLink = function() {
  const preview = document.getElementById('link-preview');
  if (!preview) return;
  const url = buildLink();
  if (!url) { preview.style.display = 'none'; return; }
  preview.textContent = url;
  preview.style.display = 'block';
};

window.copiarLink = async function() {
  const nombre = (document.getElementById('link-nombre')?.value || '').trim();
  if (!nombre) { alert('Escribe el nombre del cliente primero.'); return; }
  const btn = document.querySelector('[onclick="copiarLink()"]');

  let sid = null;
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/link_sesiones', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_SERVICE, 'Authorization': 'Bearer ' + SUPABASE_SERVICE, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({ cliente: nombre, ultimo_paso: -1, tipo: S.linkTipo })
    });
    if (res.ok) { const data = await res.json(); sid = data[0]?.id || null; }
  } catch(e) {}

  const url = buildLink(sid);
  navigator.clipboard.writeText(url).then(() => {
    if (btn) {
      const orig = btn.innerHTML;
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> ¡Copiado!';
      btn.style.color = '#3DAB7A'; btn.style.borderColor = '#3DAB7A';
      setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
    }
    fetchRecords();
  });
};

async function loadPDFLibs() {
  if (window.html2canvas && window.jspdf) return;
  const load = src => new Promise((res, rej) => {
    if (document.querySelector('script[src="' + src + '"]')) { res(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = () => rej(new Error('Error cargando ' + src));
    document.head.appendChild(s);
  });
  await load('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
  await load('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
}

async function getWhiteLogoDataURL() {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const d = ctx.getImageData(0, 0, c.width, c.height);
      for (let i = 0; i < d.data.length; i += 4) {
        if (d.data[i+3] > 10) { d.data[i] = 255; d.data[i+1] = 255; d.data[i+2] = 255; }
      }
      ctx.putImageData(d, 0, 0);
      resolve(c.toDataURL('image/png'));
    };
    img.onerror = () => resolve(null);
    img.src = window.location.origin + '/assets/logo-somos2os.png';
  });
}

      '¿Qué errores ves constantemente en tu industria que a ti ya no te sorprenden?',
      '¿Qué información incorrecta circula en tu industria que sabes que es falsa?',
      '¿Qué mitos existen sobre tu trabajo o el proceso que ayudas a resolver?',
      '¿Qué 3 consejos le darías a alguien que está comenzando a buscar soluciones?',
      '¿Qué te hubiera gustado saber antes de empezar en este camino profesional?'
    ]},
  ];

  const blocksHTML = pdfBlocks.map(blk => {
    let content = '';
    if (blk.tipo === 'lista') {
      const items = [];
      for (let i=0; i<blk.count; i++) {
        const val = answers[blk.prefix + '_q' + i];
        if (val) items.push(`<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f3f4f6;">

          <p style="margin:0;font-size:13px;line-height:1.55;color:#1e1b4b;white-space:pre-wrap;">${esc(String(val))}</p>

      }
      content = items.length ? `<div>${items.join('')}</div>` : `<p style="font-size:13px;color:#9ca3af;font-style:italic;">(sin respuestas)</p>`;
    } else if (blk.tipo === 'casos') {
      content = blk.casos.map(caso => {
        const qs = caso.qs.map((q, qi) => {
          const val = answers['c'+caso.num+'_q'+qi];
          return `<div style="margin-bottom:11px;">
            <p style="font-size:10px;font-weight:700;color:#6b7280;margin:0 0 5px;text-transform:uppercase;letter-spacing:.05em;">${esc(q)}</p>
            ${val ? `<div style="padding:10px 14px;background:#f5f3ff;border-radius:8px;border-left:3px solid ${blk.color};"><p style="margin:0;font-size:13px;color:#1e1b4b;line-height:1.6;white-space:pre-wrap;">${esc(String(val))}</p></div>` : `<p style="margin:0;font-size:12px;color:#9ca3af;font-style:italic;">Sin respuesta</p>`}
          </div>`;
        }).join('');
        return `<div style="border:1px solid #e5e7eb;border-radius:10px;padding:16px 20px;background:#fafafa;margin-bottom:10px;">
          <div style="font-size:10px;font-weight:700;color:${blk.color};text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px;">${esc(caso.label)}</div>${qs}
        </div>`;
      }).join('');
    } else {
      content = blk.qs.map((q, qi) => {
        const val = answers[blk.prefix + '_q' + qi];
        return `<div style="margin-bottom:10px;padding:13px 16px;background:${val ? '#f5f3ff' : '#fafafa'};border-radius:9px;border-left:3px solid ${val ? blk.color : '#e5e7eb'};">
          <p style="margin:0 0 7px;font-size:10px;font-weight:700;color:#6d28d9;text-transform:uppercase;letter-spacing:.06em;">${qi+1}. ${esc(q)}</p>
          ${val ? `<p style="margin:0;font-size:14px;color:#1e1b4b;line-height:1.65;white-space:pre-wrap;">${esc(String(val))}</p>` : `<p style="margin:0;font-size:13px;color:#9ca3af;font-style:italic;">Sin respuesta</p>`}
        </div>`;
      }).join('');
    }
    return `<div style="padding:28px 0 48px;border-bottom:1px solid #f3f4f6;">
      <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:18px;">
        <div style="width:4px;height:32px;background:${blk.color};border-radius:2px;flex:none;margin-top:3px;"></div>
        <div style="font-size:18px;font-weight:700;color:#1e1b4b;">${esc(blk.title)}</div>
      </div>${content}
    </div>`;
  }).join('');

  return `<div style="width:794px;background:#ffffff;font-family:Arial,sans-serif;color:#1e1b4b;">
    <div style="background:linear-gradient(135deg,#6d28d9 0%,#7c3aed 50%,#3b82f6 100%);padding:44px 56px 36px;">
      <img src="${logoSrc || logoURL}" alt="Somos2os Studio" style="height:26px;width:auto;display:block;margin-bottom:18px;${logoSrc ? '' : 'filter:brightness(0) invert(1);'}">
      <div style="display:inline-block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;background:rgba(255,255,255,0.15);padding:5px 16px;border-radius:99px;margin-bottom:18px;color:rgba(255,255,255,0.95);">Extracción de Conocimiento Experto</div>
      <div style="font-size:36px;font-weight:800;margin:0 0 8px;color:#ffffff;letter-spacing:-.02em;">${esc(r.cliente || 'Cliente')}</div>
      <p style="font-size:13px;color:rgba(199,210,254,0.6);margin:0 0 26px;">${formatDate(r.created_at)}</p>
      <div style="background:rgba(255,255,255,0.15);border-radius:99px;height:7px;overflow:hidden;max-width:400px;margin-bottom:8px;">
        <div style="background:rgba(255,255,255,0.85);height:100%;width:${pct}%;border-radius:99px;"></div>
      </div>
      <p style="font-size:12px;color:rgba(199,210,254,0.7);margin:0;">${totalAnswered} de ${totalQ} preguntas respondidas · ${pct}% completado</p>
    </div>
    <div style="padding:0 56px;">${blocksHTML}</div>
    <div style="padding:16px 56px;border-top:2px solid #ede9fe;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:11px;font-weight:700;color:#6d28d9;letter-spacing:.04em;">SOMOS2OS STUDIO</span>
      <span style="font-size:11px;color:#9ca3af;">Generado el ${today}</span>
    </div>
  </div>`;
}

window.descargarPDF = async function(tipo) {
  const r = tipo === 'diagnostico' ? S.selected : S.selectedExtraccion;
  if (!r) return;
  const btn = document.getElementById('pdf-dl-btn');
  const btn2 = document.getElementById('pdf-dl-btn2');
  const status = document.getElementById('pdf-status');
  if (btn)   { btn.textContent = 'Generando…'; btn.disabled = true; }
  if (btn2)  { btn2.textContent = 'Generando…'; btn2.disabled = true; }
  if (status) status.style.display = 'block';

  try {
    await loadPDFLibs();
    const whiteLogo = await getWhiteLogoDataURL().catch(() => null);
    const content = tipo === 'diagnostico' ? buildDiagnosticoPDFHTML(r, whiteLogo) : buildExtraccionPDFHTML(r, whiteLogo);
    const temp = document.createElement('div');
    temp.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#fff;z-index:-100;';
    temp.innerHTML = content;
    document.body.appendChild(temp);

    const canvas = await html2canvas(temp, { scale:2, useCORS:true, backgroundColor:'#ffffff', width:794, windowWidth:794 });
    if (document.body.contains(temp)) document.body.removeChild(temp);

    const { jsPDF } = window.jspdf;
    const pdf        = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const pageW      = pdf.internal.pageSize.getWidth();   // 210 mm
    const pageH      = pdf.internal.pageSize.getHeight();  // 297 mm
    // Leave 18mm at the bottom; no top margin so page 1 header bleeds to edge
    const contentHmm = pageH - 18;
    const pxPerMm    = canvas.width / pageW;
    const pageHpx    = Math.round(contentHmm * pxPerMm);
    const ctx = canvas.getContext('2d');

    // Split canvas at natural white-row boundaries (no early exit = finds the best gap)
    let startY = 0, pageIdx = 0;
    while (startY < canvas.height) {
      let endY = Math.min(startY + pageHpx, canvas.height);
      if (endY < canvas.height) {
        // Scan the last 22% of page height for the whitest row
        const limit = Math.max(startY + 1, endY - Math.round(pageHpx * 0.22));
        let bestY = endY, bestScore = -1;
        for (let y = endY; y >= limit; y--) {
          const d = ctx.getImageData(0, y, canvas.width, 1).data;
          let white = 0;
          for (let i = 0; i < d.length; i += 4) { if (d[i]>240 && d[i+1]>240 && d[i+2]>240) white++; }
          const score = white / canvas.width;
          if (score > bestScore) { bestScore = score; bestY = y; }
        }
        endY = bestY;
      }

      const pc = document.createElement('canvas');
      pc.width = canvas.width;
      pc.height = Math.max(1, endY - startY);
      const pctx = pc.getContext('2d');
      pctx.fillStyle = '#fff'; pctx.fillRect(0, 0, pc.width, pc.height);
      pctx.drawImage(canvas, 0, -startY);

      if (pageIdx > 0) pdf.addPage();
      // Y=0 so header on page 1 touches the top edge; bottom 18mm stays blank
      pdf.addImage(pc.toDataURL('image/jpeg', 0.93), 'JPEG', 0, 0, pageW, pc.height / pxPerMm);
      pageIdx++;
      startY = endY;
    }

    const slug = (r.cliente || 'cliente').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    pdf.save(tipo + '-' + slug + '.pdf');
  } catch(e) {
    console.error(e);
    alert('No se pudo generar el PDF. Verifica tu conexión e intenta nuevamente.');
  } finally {
    const dlLabel = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Descargar PDF`;
    if (btn)   { btn.innerHTML = dlLabel; btn.disabled = false; }
    if (btn2)  { btn2.innerHTML = dlLabel; btn2.disabled = false; }
    if (status) status.style.display = 'none';
  }
};
