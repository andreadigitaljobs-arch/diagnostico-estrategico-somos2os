    nota: 'Piensa en los clientes que se tardaron más en decidirse. ¿Qué los frenaba internamente?',
    ejemplos: [
      '"No sé si realmente calificaré para esto..."',

    ],

  },
  {
    title: 'Errores Comunes',
    tag: 'Sección 3 · 5',
    tipo: 'lista',
    color: '#7A2C9E',
    que: 'Los <strong>errores comunes</strong> son las equivocaciones que cometen las personas cuando intentan resolver este problema <em>sin orientación profesional</em>. Son las razones por las que después llegan a ti a buscar ayuda. Este conocimiento es oro puro para tu estrategia de contenido.',
    nota: '¿Qué historias de "lo intenté solo y salió mal" escuchas más seguido?',
    ejemplos: [
      'Entregar documentos incompletos o en el formato incorrecto',
      'No cumplir los plazos establecidos por desconocimiento',

    ],
    count: 15,

      { q: '¿Qué te hubiera gustado saber antes de empezar en este camino profesional? ¿Qué ojalá alguien te hubiera dicho?', ph: 'Ej: Lecciones aprendidas, errores propios, cosas que nadie te enseñó...' }

];

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let S = { step: 0, maxStep: 0, answers: {}, sent: false };

function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    if (CLIENT_NAME && raw.clienteName !== CLIENT_NAME) return;
    S.step    = raw.step    || 0;
    S.maxStep = raw.maxStep || raw.step || 0;
    S.answers = raw.answers || {};
    if (S.step >= TOTAL_SCREENS - 1) { S.step = 0; S.maxStep = 0; }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      clienteName: CLIENT_NAME,
      step: S.step, maxStep: S.maxStep, answers: S.answers
    }));
  } catch(e) {}
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function countAnswered() {
  return Object.values(S.answers).filter(v => v !== '' && v !== undefined && v !== null).length;
}

function totalQuestions() {
  // 15+15+15 + 12 (3 casos×4) + 3 + 5 = 65
  return 65;
}

  try { document.documentElement.scrollTop = 0; } catch(e) {}
  try { document.body.scrollTop = 0; } catch(e) {}
  try { window.scrollTo(0, 0); } catch(e) {}
}

// ─── NAVEGACIÓN ───────────────────────────────────────────────────────────────
window.go = function(step) {
  const current = document.querySelector('.form-card');
  if (current) {
    current.classList.add('animate-leave');
    setTimeout(() => executeGo(step), 400);
  } else {
    executeGo(step);
  }
};

function executeGo(step) {
  scrollTop();
  S.step = Math.max(0, Math.min(TOTAL_SCREENS - 1, step));
  if (S.step > S.maxStep) S.maxStep = S.step;
  trackStepExt(S.step);
  saveState();
  render();
  const newCard = document.querySelector('.form-card');
  if (newCard) newCard.classList.add('animate-enter');
  requestAnimationFrame(() => scrollTop());
}

// ─── TOAST GUARDADO ───────────────────────────────────────────────────────────
let _toastTimer;
function showSaveToast() {
  const t = document.getElementById('save-toast');
  if (!t) return;
  t.style.opacity = '1'; t.style.transform = 'translateY(0)';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => {
    t.style.opacity = '0'; t.style.transform = 'translateY(8px)';
  }, 1600);
}

// ─── UPDATE ANSWERS ───────────────────────────────────────────────────────────
window.updateAnswer = function(id, val) {
  S.answers[id] = val;
  saveState();
  showSaveToast();
};

// ─── ENVÍO ────────────────────────────────────────────────────────────────────
function buildSummary() {
  const lines = [];
  lines.push('EXTRACCIÓN DE CONOCIMIENTO EXPERTO');
  lines.push((CLIENT_NAME || 'Cliente') + ' · Somos2os Studio');
  lines.push('Fecha: ' + new Date().toLocaleDateString('es-ES'));
  lines.push('');

  BLOCKS.forEach((blk, bi) => {
    lines.push('═══ ' + blk.title.toUpperCase() + ' ═══');
    if (blk.tipo === 'lista') {
      for (let i = 0; i < blk.count; i++) {
        const id = 's' + (bi+1) + '_q' + i;
        const a = S.answers[id];
        lines.push((i+1) + '. ' + (a || '(sin respuesta)'));
      }
    } else if (blk.tipo === 'casos') {
      blk.casos.forEach((caso, ci) => {
        lines.push('--- ' + caso.label + ' ---');
        caso.qs.forEach((q, qi) => {
          const id = 'c' + (ci+1) + '_q' + qi;
          lines.push(q);
          lines.push('   ' + (S.answers[id] || '(sin respuesta)'));
        });
      });
    } else {
      blk.qs.forEach((item, qi) => {
        const id = 's' + (bi+1) + '_q' + qi;
        lines.push(item.q);
        lines.push('   ' + (S.answers[id] || '(sin respuesta)'));
        lines.push('');
      });
    }
    lines.push('');
  });
  return lines.join('\n');
}

window.sendForm = async function() {
  const btn = document.getElementById('send-btn');
  if (btn) { btn.innerHTML = '<span>Guardando...</span>'; btn.disabled = true; }
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/extracciones', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json', 'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        cliente: CLIENT_NAME || 'Cliente',
        fecha: new Date().toISOString(),
        answers: S.answers,
        resumen: buildSummary()
      })
    });
    if (res.ok) {
      S.sent = true;
      saveState();
      render();
    } else {
      if (btn) { btn.innerHTML = '<span>Enviar respuestas →</span>'; btn.disabled = false; }
      alert('Hubo un error al guardar. Intenta de nuevo.');
    }
  } catch(e) {
    if (btn) { btn.innerHTML = '<span>Enviar respuestas →</span>'; btn.disabled = false; }
    alert('Sin conexión. Verifica tu internet e intenta de nuevo.');
  }
};

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const step     = S.step;
  const isIntro  = step === 0;
  const isClose  = step === TOTAL_SCREENS - 1;
  const isResumen = step === TOTAL_SCREENS - 2;
  const isBlock  = step >= 1 && step <= 6;
  const blockIdx = isBlock ? step - 1 : -1;
  const blk      = isBlock ? BLOCKS[blockIdx] : null;
  const showProg = !isIntro && !isClose;

  // Header
  const header = document.getElementById('main-header');
  if (header) {
    header.style.display = showProg ? 'block' : 'none';
    if (showProg) header.classList.add('animate-header');
    const lbl = document.getElementById('header-progress-label');
    if (lbl) {
      if (isResumen) lbl.textContent = 'Resumen';
      else if (isBlock) lbl.textContent = blk.tag;
      else lbl.textContent = '';
    }
  }

  // Barra de progreso
  const pct = Math.round((step / (TOTAL_SCREENS - 1)) * 100);
  const progBar = showProg ? `
    <div style="width:100%;max-width:680px;margin:0 auto 20px;padding:0 4px;">
      <div style="height:4px;background:rgba(230,226,242,0.6);border-radius:99px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#2E72D8,#7A2C9E);border-radius:99px;transition:width .5s ease;"></div>
      </div>
    </div>` : '';

  const mobileSpacerHTML = '<div class="mobile-spacer" style="height:90px;display:none;"></div>';

  let html = '';
  const wrapClass = showProg ? 'form-wrap has-header' : 'form-wrap';
  const wrapBg = isIntro ? '' : `background:url('assets/background.png') no-repeat center center fixed;background-size:cover;`;

  html += `<div class="${wrapClass}" style="min-height:100vh;min-height:100dvh;padding:${isIntro ? '40px 20px' : '110px 20px 48px'};display:flex;flex-direction:column;align-items:center;${isIntro ? 'justify-content:center;' : ''}${wrapBg}">`;
  html += progBar;

  if (isIntro)     html += buildIntroHTML();
  else if (isBlock) html += buildBlockHTML(blk, blockIdx);
  else if (isResumen) html += buildResumenHTML();
  else if (isClose) html += buildCloseHTML();

  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

      <div style="width:36px;height:36px;border-radius:10px;background:${ok ? 'linear-gradient(135deg,#3DAB7A,#2E9E68)' : 'linear-gradient(135deg,rgba(46,114,216,.15),rgba(122,44,158,.15))'};display:flex;align-items:center;justify-content:center;flex:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${ok ? '#fff' : blk.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${ok ? '<polyline points="20 6 9 17 4 12"/>' : '<path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>'}

      <p style="font-size:14px;color:#9A95AD;margin:4px 0 0;">${answered} de ${total} preguntas respondidas</p>
    </div>
    <div style="height:8px;background:#E5E1F2;border-radius:99px;overflow:hidden;margin-bottom:28px;">
      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#2E72D8,#7A2C9E);border-radius:99px;transition:width .5s ease;"></div>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px;">
      ${seccionesHTML}
    </div>

    ${mobileSpacerHTML}
    <div class="form-nav" style="display:flex;flex-direction:column;gap:10px;margin-top:0;padding-top:20px;border-top:1px solid #F0EEF8;">
      <button onclick="go(${TOTAL_SCREENS - 1})" class="btn-primary" style="width:100%;padding:15px;font-size:15.5px;border-radius:12px;">${pct===100 ? 'Enviar extracción →' : 'Enviar de todas formas →'}</button>
      <button onclick="go(${TOTAL_SCREENS - 3})" class="btn-secondary" style="width:100%;text-align:center;">← Volver</button>
    </div>

// ─── PARTÍCULAS ───────────────────────────────────────────────────────────────
window.introParticlesActive = true;
document.addEventListener('DOMContentLoaded', () => {
  if (S.step > 0) {
    const intro = document.getElementById('intro-screen');
    if (intro) intro.style.display = 'none';
    window.introParticlesActive = false;
    return;
  }
  const canvas = document.getElementById('particles-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;
  window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });
  const particles = [];
  const max = width < 600 ? 40 : 90;
  const interaction = { x: null, y: null, radius: 120 };
  class Particle {
    constructor() { this.x = Math.random()*width; this.y = Math.random()*height; this.vx = (Math.random()-.5)*.4; this.vy = (Math.random()-.5)*.4; this.radius = Math.random()*2+.5; this.color = Math.random()>.5 ? 'rgba(167,139,250,0.4)' : 'rgba(129,140,248,0.3)'; }
    update() {
      this.x += this.vx; this.y += this.vy;
      if (this.x < 0 || this.x > width) this.vx *= -1;
      if (this.y < 0 || this.y > height) this.vy *= -1;
      if (interaction.x !== null) { const dx=this.x-interaction.x, dy=this.y-interaction.y, dist=Math.sqrt(dx*dx+dy*dy); if (dist<interaction.radius) { const f=(interaction.radius-dist)/interaction.radius; this.x+=(dx/dist)*f*1.5; this.y+=(dy/dist)*f*1.5; } }
    }
    draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2); ctx.fillStyle=this.color; ctx.fill(); }
  }
  for (let i=0; i<max; i++) particles.push(new Particle());
  const upd = e => { if (e.touches) { interaction.x=e.touches[0].clientX; interaction.y=e.touches[0].clientY; } else { interaction.x=e.clientX; interaction.y=e.clientY; } };
  const clr = () => { interaction.x=null; interaction.y=null; };
  window.addEventListener('mousemove',upd); window.addEventListener('mouseout',clr); window.addEventListener('touchmove',upd); window.addEventListener('touchend',clr);
  function animate() {
    if (!window.introParticlesActive) return;
    ctx.clearRect(0,0,width,height);
    particles.forEach(p => { p.update(); p.draw(); });
    for (let i=0; i<particles.length; i++) for (let j=i+1; j<particles.length; j++) { const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, dist=Math.sqrt(dx*dx+dy*dy); if (dist<100) { ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.strokeStyle=`rgba(167,139,250,${.1*(1-dist/100)})`; ctx.lineWidth=.5; ctx.stroke(); } }
    requestAnimationFrame(animate);
  }
  animate();
});

window.dismissIntro = function() {
  trackOpenExt();
  const intro = document.getElementById('intro-screen');
  if (intro) {
    intro.classList.add('fade-out');
    sessionStorage.setItem('somos2os_extraccion_intro','true');
    const card = document.querySelector('.form-card');
    if (card) { card.classList.remove('animate-enter'); card.style.opacity='0'; void card.offsetWidth; setTimeout(() => { card.style.opacity=''; card.classList.add('animate-enter'); }, 250); }
    setTimeout(() => { intro.style.display='none'; window.introParticlesActive=false; }, 1200);
  }
};

// ─── TRACKING ────────────────────────────────────────────────────────────────
const SESSION_KEY_EXT = 'somos2os_extraccion_sesion';
let _sesionIdExt = null;

function _saveSesionIdExt(id) {
  _sesionIdExt = id;
  try { localStorage.setItem(SESSION_KEY_EXT, JSON.stringify({ id, cliente: CLIENT_NAME })); } catch(e) {}
}

(async function initTrackingExt() {
  if (!CLIENT_NAME) return;
  try {
    const sidFromUrl = new URLSearchParams(window.location.search).get('sid');
    if (sidFromUrl) { _saveSesionIdExt(sidFromUrl); return; }
    const stored = JSON.parse(localStorage.getItem(SESSION_KEY_EXT) || 'null');
    if (stored?.id && stored.cliente === CLIENT_NAME) { _sesionIdExt = stored.id; }
  } catch(e) {}
})();

async function trackOpenExt() {
  if (!CLIENT_NAME) return;
  try {
    if (_sesionIdExt) {
      fetch(SUPABASE_URL + '/rest/v1/link_sesiones?id=eq.' + _sesionIdExt, {
        method: 'PATCH',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ ultimo_paso: 0, ultimo_acceso: new Date().toISOString() })
      });
      return;
    }
    const lookup = await fetch(
      SUPABASE_URL + '/rest/v1/link_sesiones?cliente=eq.' + encodeURIComponent(CLIENT_NAME) + '&tipo=eq.extraccion&order=created_at.desc&limit=1',
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    if (lookup.ok) {
      const data = await lookup.json();
      if (data[0]) {
        _saveSesionIdExt(data[0].id);
        fetch(SUPABASE_URL + '/rest/v1/link_sesiones?id=eq.' + data[0].id, {
          method: 'PATCH',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ ultimo_paso: 0, ultimo_acceso: new Date().toISOString() })
        });
      }
    }
  } catch(e) {}
}

function trackStepExt(step) {
  if (!_sesionIdExt) return;
  fetch(SUPABASE_URL + '/rest/v1/link_sesiones?id=eq.' + _sesionIdExt, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ ultimo_paso: step, ultimo_acceso: new Date().toISOString() })
  }).catch(() => {});
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadState();
render();
</script>
