    body {

    textarea, input, button { font-family: inherit; }

    /* Asegurar que los títulos siempre entren en una sola línea */

    .form-card {

    .btn-primary {
      border: none;

    .btn-primary:active {
      transform: translateY(-1px) scale(0.98);
    }
    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;

    .btn-secondary {
      border: 1.5px solid #E0DCEF;

      padding: 13px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;

    .btn-secondary:hover {
      background: #FAF9FD;
      border-color: #7A2C9E;
      color: #7A2C9E;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -10px rgba(90,52,160,0.18);
    }
    .btn-secondary:active {
      transform: translateY(0);
    }

    .q-textarea {
      margin-left: 43px;
      width: calc(100% - 43px);
      resize: vertical;
      min-height: 54px;
      border: 1.5px solid #E6E3F2;
      border-radius: 14px;
      padding: 13px 15px;
      font-size: 15.5px;
      line-height: 1.5;
      color: #2C2742;
      background: #FBFAFE;
      outline: none;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .q-textarea:hover {
      border-color: #CFC9E3;
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(90, 52, 160, 0.04);
    }
    .q-textarea:focus {
      border-color: #5A45C4;
      box-shadow: 0 0 0 4px rgba(90,69,196,.15), 0 8px 20px -8px rgba(90,69,196,.12);
      background: #fff;
      transform: translateY(-2px);
    }

    .tarea-item {
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1) !important;
    }
    .tarea-item:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 10px 24px -10px rgba(122, 44, 158, 0.15);
      border-color: #7A2C9E !important;
      background: linear-gradient(135deg,rgba(46,114,216,.08),rgba(122,44,158,.08)) !important;
    }
    .tarea-item:active {
      transform: translateY(0) scale(0.99);
    }

    .questions-wrapper {
      padding-bottom: 20px;
    }

        flex-direction: column !important;
        justify-content: center !important;

      .form-header {
        margin-bottom: 24px !important;
      }
      .form-logo {
        height: 32px !important;
      }
      /* Brújula en móvil: arriba a la derecha, detrás del texto */
      .floating-compass {
        position: absolute !important;
        right: 4px !important;
        top: -4px !important;
        width: 88px !important;
        height: 88px !important;
        z-index: 0 !important;
        pointer-events: none !important;

      }
      .form-card {

        border-radius: 20px !important;
        padding: 20px 18px 18px !important;
        box-shadow: 0 8px 32px rgba(60, 40, 120, 0.08) !important;
        border: 1px solid rgba(255, 255, 255, 0.5) !important;
        max-width: 100% !important;
        margin: 0 !important;
      }

      .questions-wrapper {
        padding-bottom: 20px !important;
      }
       .form-h1 {
        font-size: clamp(20px, 6.2vw, 30px) !important;
        line-height: 1.15 !important;
        text-align: left !important;
        margin-bottom: 12px !important;
      }
      .form-h2 {
        font-size: clamp(17px, 5.2vw, 24px) !important;

      .form-h2-close {
        font-size: clamp(20px, 6vw, 26px) !important;
      }
      .form-card p {
        text-align: left !important;
      }
      /* Rediseño de items informativos en móvil */
      .form-card .form-body {
        text-align: left !important;
        font-size: 13.5px !important;
      }
      .welcome-text-container {
        padding-right: 75px !important;
      }
      .form-label {
        font-size: 15px !important;
      }
      /* Estirar las áreas de texto en móvil eliminando el margen de 43px */
      .q-textarea {
        margin-left: 0 !important;
        width: 100% !important;
        font-size: 16px !important; /* mínimo 16px evita auto-zoom en iOS */
      }
      .q-scale {
        margin-left: 0 !important;
        padding: 14px 12px !important;
      }
      /* Barra de navegación inferior fija */
      .form-nav {
        position: fixed !important;
        bottom: 16px !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        width: calc(100% - 32px) !important;
        max-width: 500px !important;
        background: rgba(255, 255, 255, 0.88) !important;
        backdrop-filter: blur(20px) !important;
        -webkit-backdrop-filter: blur(20px) !important;
        padding: 12px 18px !important;
        border-radius: 16px !important;
        border: 1px solid rgba(255, 255, 255, 0.6) !important;
        z-index: 1000 !important;
        box-shadow: 0 10px 30px rgba(60, 40, 120, 0.12) !important;
      }
      .btn-primary {
        font-size: 14.5px !important;
        padding: 12px 20px !important;
        border-radius: 10px !important;
      }
      .btn-secondary {
        font-size: 14px !important;
        padding: 11px 16px !important;
        border-radius: 10px !important;
      }
      .mobile-spacer {
        display: block !important;
      }
    }


    input[type="range"] {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 99px;
      background: linear-gradient(90deg, #2E72D8, #7A2C9E);
      outline: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #7A2C9E;
      box-shadow: 0 2px 8px rgba(90,52,160,.35);
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    input[type="range"]:hover::-webkit-slider-thumb {
      transform: scale(1.25);
      background-color: #FAF9FD;
      box-shadow: 0 4px 14px rgba(90,52,160,.5);
      border-color: #2E72D8;
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #7A2C9E;
      box-shadow: 0 2px 8px rgba(90,52,160,.35);
      cursor: pointer;
      border: none;
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    input[type="range"]:hover::-moz-range-thumb {
      transform: scale(1.25);
      background-color: #FAF9FD;
      box-shadow: 0 4px 14px rgba(90,52,160,.5);
      border-color: #2E72D8;
    }

    /* Animación flotante para la brújula */
    @keyframes floatCompass {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    .floating-compass {
      animation: floatCompass 6s ease-in-out infinite;
    }

    /* Animaciones globales de Entrada y Salida de componentes */
    @keyframes screenFadeIn {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes screenFadeOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(-18px) scale(0.98); }
    }

    .animate-enter {
      animation: screenFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      will-change: transform, opacity;
    }

    .animate-leave {
      animation: screenFadeOut 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      will-change: transform, opacity;
    }

    @keyframes headerFadeIn {
      from { opacity: 0; transform: translateY(-8px); filter: blur(1.5px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    .animate-header {
      animation: headerFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      will-change: transform, opacity;
    }

    /* Estilos de la Cortina Animada de Bienvenida */
    .intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh; /* viewport dinámico: excluye barra del navegador en móvil */
      background: #090514;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #fff;
      overflow: hidden;
      font-family: 'Sora', sans-serif;
    }

    #particles-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .intro-content-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      max-width: 800px;
      padding: 0 24px;
    }

    .intro-bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(90,69,196,0.35) 0%, rgba(122,44,158,0) 70%);
      filter: blur(50px);
      animation: pulseGlow 10s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    .intro-bg-glow-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(122,44,158,0.25) 0%, rgba(90,69,196,0) 70%);
      filter: blur(60px);
      animation: pulseGlow2 15s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
      bottom: -100px;
      right: -100px;
    }

    @keyframes pulseGlow {
      0% { transform: scale(0.8) translate(-30px, -30px); opacity: 0.6; }
      100% { transform: scale(1.1) translate(30px, 30px); opacity: 0.9; }
    }

    @keyframes pulseGlow2 {
      0% { transform: scale(0.9) translate(40px, 40px); opacity: 0.5; }
      100% { transform: scale(1.2) translate(-40px, -40px); opacity: 0.8; }
    }

    @keyframes shine {
      0% { left: -150%; }
      50% { left: -150%; }
      100% { left: 150%; }
    }

    .intro-title {
      font-size: 14px;
      font-weight: 700;
      color: #7A2C9E;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.3s;
      margin-bottom: 20px;
      text-shadow: 0 0 15px rgba(122,44,158,0.4);
    }

    .intro-heading {
      font-size: 64px;
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 20%, #a78bfa 60%, #c084fc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      opacity: 0;
      filter: blur(10px);
      transform: translateY(40px);
      animation: revealText 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.6s;
      margin-bottom: 24px;
    }

    @keyframes revealText {
      to {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0);
      }
    }

    .intro-phrase {
      font-size: 18px;
      font-weight: 400;
      color: #c2bdd3;
      text-align: center;
      max-width: 580px;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 1.4s;
      margin-bottom: 48px;
    }

    .intro-btn {
      opacity: 0;
      transform: translateY(15px);
      animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 2s;
    }

    .intro-btn-action {
      padding: 18px 44px;
      border-radius: 99px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: none;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg,#2E72D8,#7A2C9E);
      box-shadow: 0 15px 35px -10px rgba(90,52,160,0.6);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .intro-btn-action:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 20px 40px -8px rgba(122,44,158,0.7);
    }

    .intro-btn-action:active {
      transform: translateY(-1px) scale(0.98);
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Animación de salida */
    .intro-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.05);
      transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Estilos responsivos para teléfonos móviles */
    @media (max-width: 600px) {
      .intro-title {
        font-size: 13px;
        margin-bottom: 16px;
        letter-spacing: 0.2em;
      }
      .intro-heading {
        font-size: 44px;
        margin-bottom: 18px;
      }
      .intro-phrase {
        font-size: 15px;
        line-height: 1.55;
        margin-bottom: 40px;
        color: #b6b2c9;
      }
      .intro-btn-action {
        padding: 16px 36px !important;
        font-size: 16px !important;
        width: 85vw;
        max-width: 320px;
      }
    }
  </style>
</head>

// Sistema de partículas interactivas en el Canvas
window.introParticlesActive = true;
document.addEventListener("DOMContentLoaded", () => {
  // Si el usuario ya avanzó en el diagnóstico, ocultar la pantalla de bienvenida
  if (S.step > 0) {
    const intro = document.getElementById('intro-screen');
    if (intro) intro.style.display = 'none';
    window.introParticlesActive = false;
    return;
  }

  const canvas = document.getElementById('particles-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  
  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  });

  const particles = [];
  const maxParticles = width < 600 ? 40 : 90; // Menos partículas en móvil para rendimiento óptimo
  
  const interaction = { x: null, y: null, radius: 120 };

  class Particle {
    constructor() {
      this.x = Math.random() * width;
      this.y = Math.random() * height;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = (Math.random() - 0.5) * 0.4;
      this.radius = Math.random() * 2 + 0.5;
      this.color = Math.random() > 0.5 ? 'rgba(167, 139, 250, 0.4)' : 'rgba(129, 140, 248, 0.3)';
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;

      if (this.x < 0 || this.x > width) this.vx *= -1;
      if (this.y < 0 || this.y > height) this.vy *= -1;

      // Interacción táctil o de mouse
      if (interaction.x !== null && interaction.y !== null) {
        const dx = this.x - interaction.x;
        const dy = this.y - interaction.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < interaction.radius) {
          const force = (interaction.radius - dist) / interaction.radius;
          this.x += (dx / dist) * force * 1.5;
          this.y += (dy / dist) * force * 1.5;
        }
      }
    }

    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
  }

  for (let i = 0; i < maxParticles; i++) {
    particles.push(new Particle());
  }

  // Capturar gestos/toques
  const updateCoords = (e) => {
    if (e.touches && e.touches.length > 0) {
      interaction.x = e.touches[0].clientX;
      interaction.y = e.touches[0].clientY;
    } else {
      interaction.x = e.clientX;
      interaction.y = e.clientY;
    }
  };

  const clearCoords = () => {
    interaction.x = null;
    interaction.y = null;
  };

  window.addEventListener('mousemove', updateCoords);
  window.addEventListener('mouseout', clearCoords);
  window.addEventListener('touchmove', updateCoords);
  window.addEventListener('touchend', clearCoords);

  function animate() {
    if (!window.introParticlesActive) return;
    ctx.clearRect(0, 0, width, height);

    particles.forEach(p => {
      p.update();
      p.draw();
    });

    // Dibujar líneas finas entre partículas cercanas
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(167, 139, 250, ${0.1 * (1 - dist/100)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(animate);
  }

  animate();
});

// ─── UTILIDADES ───────────────────────────────────────────────────────────────
function qid(b, i) { return 'b' + b + '_q' + i; }

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function buildSummary() {
  const lines = [];
  lines.push('DIAGNÓSTICO ESTRATÉGICO — Sesión 1');
  lines.push('Daniela Harrington · Somos2os Studio');
  lines.push('Fecha: ' + new Date().toLocaleDateString('es-ES'));
  lines.push('');
  BLOCKS.forEach((blk, bi) => {
    lines.push('— ' + blk.title.toUpperCase() + ' (' + blk.time + ') —');
    blk.qs.forEach((q, i) => {
      const text = (typeof q === 'string') ? q : q.q;
      const id   = qid(bi, i);
      const a    = S.answers[id];
      lines.push(text);
      lines.push('   ' + (a !== undefined && a !== '' ? a : '(sin respuesta)'));
      lines.push('');
    });
  });
  lines.push('— MATERIALES PARA AUDITORÍA —');
  TAREA_LABELS.forEach((l, i) => {
    const checked = S.tarea[i] ? '[x]' : '[ ]';
    const labelText = typeof l === 'string' ? l : l.label;
    const link = S.tareaLinks[i] ? ` (Info: ${S.tareaLinks[i]})` : '';
    lines.push(`${checked} ${labelText}${link}`);
  });
  return lines.join('\n');
}

window.go = function(step) {
  // Validación suave al avanzar desde un bloque
  if (step > S.step && S.step >= 1 && S.step <= BLOCKS.length) {
    const bi = S.step - 1;
    const empty = BLOCKS[bi].qs.filter((raw, i) => {
      if (typeof raw === 'object' && raw.scale) return false;
      const v = S.answers[qid(bi, i)];
      return !v || String(v).trim() === '';
    }).length;
    if (empty > 0) { showValidationModal(empty, step); return; }
  }
  const card = document.querySelector('.form-card');
  if (card && step !== 0) {
    // Si hay una tarjeta activa y no vamos a la cortina de bienvenida, aplicar salida
    card.classList.remove('animate-enter');
    card.classList.add('animate-leave');
    
    // Esperar a que termine la animación de salida para cambiar el paso
    setTimeout(() => {
      executeGo(step);
    }, 400);
  } else {
    executeGo(step);
  }
};

function executeGo(step) {
  S.step = Math.max(0, Math.min(TOTAL_SCREENS - 1, step));
  if (S.step > S.maxStep) S.maxStep = S.step;
  saveState();
  render();
  
  // Agregar la animación de entrada a la nueva tarjeta renderizada
  const newCard = document.querySelector('.form-card');
  if (newCard) {
    newCard.classList.add('animate-enter');

  try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e) { window.scrollTo(0, 0); }
}

window.continueAnyway = function(step) {
  const card = document.querySelector('.form-card');
  if (card) { card.classList.remove('animate-enter'); card.classList.add('animate-leave'); setTimeout(() => executeGo(step), 400); }
  else executeGo(step);
};

// ─── RENDER PRINCIPAL ─────────────────────────────────────────────────────────
function render() {
  const step      = S.step;
  const isIntro   = step === 0;
  const isClose   = step === TOTAL_SCREENS - 1;
  const isResumen = step === TOTAL_SCREENS - 2;
  const isTarea   = step === TOTAL_SCREENS - 3;
  const isBlock   = !isIntro && !isClose && !isTarea && !isResumen;
  const showProg  = !isIntro && !isClose;
  const blockIdx  = step - 1;
  const blk       = isBlock ? BLOCKS[blockIdx] : null;
  const pct       = Math.round((step / (TOTAL_SCREENS - 1)) * 100);
  const stepLabel = isBlock
    ? `Bloque ${blockIdx + 1} de ${BLOCKS.length}`
    : isTarea ? 'Tarea final'
    : isResumen ? 'Resumen' : '';

  // Controlar la visibilidad y contenido del header superior fijo
  const mainHeader = document.getElementById('main-header');
  const progressLabel = document.getElementById('header-progress-label');
  if (mainHeader) {
    if (step > 0) {
      mainHeader.style.display = 'flex';
      if (progressLabel) {
        progressLabel.textContent = stepLabel;
      }
    } else {
      mainHeader.style.display = 'none';
    }
  }

  // Padding dinámico para compensar el header superior fijo
  const wrapPadding = step > 0 ? '112px 20px 40px' : '40px 20px';
  const hasHeaderClass = step > 0 ? 'has-header' : '';

  let html = `
  <div class="form-wrap ${hasHeaderClass}" style="min-height:100vh;width:100%;max-width:100vw;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background: url('assets/background.png') no-repeat center center fixed;
    background-size: cover;
    padding:${wrapPadding};">

    <!-- Barra de progreso -->
    ${showProg ? `
    <div class="animate-header" style="width:100%;max-width:780px;margin-bottom:24px;">
      <div style="height:8px;width:100%;background:#E5E1F2;border-radius:99px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#2E72D8,#5A45C4 55%,#7A2C9E);border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1);"></div>
      </div>
    </div>` : ''}
  `;

  if      (isIntro)   html += buildIntroHTML();
  else if (isBlock)   html += buildBlockHTML(blk, blockIdx);
  else if (isTarea)   html += buildTareaHTML();
  else if (isResumen) html += buildResumenHTML();
  else if (isClose)   html += buildCloseHTML();

  html += '</div>';
  document.getElementById('app').innerHTML = html;
  
  // Agregar la animación de entrada al renderizar la tarjeta la primera vez
  const activeCard = document.querySelector('.form-card');
  if (activeCard && !activeCard.classList.contains('animate-leave')) {
    activeCard.classList.add('animate-enter');
  }

  // Ajustar la altura de todos los textareas cargados según su contenido
  document.querySelectorAll('.q-textarea, .tarea-textarea').forEach(ta => {
    ta.style.height = 'auto';
    ta.style.height = (ta.scrollHeight) + 'px';
  });
}

// ─── INICIO ───────────────────────────────────────────────────────────────────
loadState();
render();
</script>
