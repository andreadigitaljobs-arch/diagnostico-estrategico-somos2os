<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diagnóstico Estratégico · Somos2os Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #F4F3FB;
      color: #1C1830;
      -webkit-font-smoothing: antialiased;
    }
    textarea, input, button { font-family: inherit; }
    textarea::placeholder { color: #B6B2C9; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #D8D4EA; border-radius: 8px; }

    .btn-primary {
      border: none;
      cursor: pointer;
      padding: 14px 30px;
      border-radius: 12px;
      background: linear-gradient(120deg, #2E72D8, #5A45C4 55%, #7A2C9E);
      color: #fff;
      font-size: 15.5px;
      font-weight: 700;
      box-shadow: 0 14px 26px -12px rgba(90,52,160,.6);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 20px 34px -12px rgba(90,52,160,.7); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .btn-secondary {
      border: 1.5px solid #E0DCEF;
      background: #fff;
      color: #5A5470;
      cursor: pointer;
      padding: 13px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      transition: background .15s ease, border-color .15s ease;
    }
    .btn-secondary:hover { background: #F7F6FC; border-color: #CFC9E3; }

    .q-textarea {
      margin-left: 43px;
      width: calc(100% - 43px);
      resize: vertical;
      min-height: 54px;
      border: 1.5px solid #E6E3F2;
      border-radius: 14px;
      padding: 13px 15px;
      font-size: 15.5px;
      line-height: 1.5;
      color: #2C2742;
      background: #FBFAFE;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    .q-textarea:focus {
      border-color: #5A45C4;
      box-shadow: 0 0 0 4px rgba(90,69,196,.13);
      background: #fff;
    }

    /* ── MÓVIL ── */
    @media (max-width: 600px) {
      .form-wrap    { padding: 16px 12px 48px !important; }
      .form-header  { margin-bottom: 14px !important; }
      .form-logo    { height: 28px !important; }
      .form-card    { padding: 22px 18px 20px !important; border-radius: 18px !important; }
      .form-h1      { font-size: 28px !important; line-height: 1.12 !important; margin-bottom: 10px !important; }
      .form-h2      { font-size: 22px !important; margin-bottom: 20px !important; }
      .form-h2-close{ font-size: 24px !important; }
      .form-sub     { font-size: 13px !important; }
      .form-body    { font-size: 14.5px !important; line-height: 1.58 !important; }
      .form-label   { font-size: 15px !important; }
      .q-textarea   { margin-left: 36px !important; width: calc(100% - 36px) !important; font-size: 14.5px !important; }
      .q-scale      { margin-left: 36px !important; padding: 14px 14px !important; }
      .form-nav     { margin-top: 24px !important; padding-top: 18px !important; }
      .btn-primary  { font-size: 15px !important; padding: 14px 20px !important; }
      .btn-secondary{ font-size: 14px !important; padding: 12px 16px !important; }
      .close-btns   { gap: 8px !important; }
      .close-btns .btn-secondary { padding: 11px 14px !important; font-size: 13.5px !important; }
    }


    input[type="range"] {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 99px;
      background: linear-gradient(90deg, #2E72D8, #7A2C9E);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #7A2C9E;
      box-shadow: 0 2px 8px rgba(90,52,160,.35);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #7A2C9E;
      box-shadow: 0 2px 8px rgba(90,52,160,.35);
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ─── CONFIGURACIÓN ────────────────────────────────────────────────────────────
// Reemplaza estos valores con los de tu proyecto de Supabase
const SUPABASE_URL = 'https://qwmhflgtdvqoeuwboknw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3bWhmbGd0ZHZxb2V1d2Jva253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4Mzk2NDEsImV4cCI6MjA5NzQxNTY0MX0.3Ej1Cs7yY6Uoo7YPTX6X7MbOMZBHGQDdWmk9q3fEA2w';
const COACH_EMAIL  = 'hola@somos2os.studio';
const STORAGE_KEY  = 'somos2os_diagnostico_v1';

// ─── DATOS ────────────────────────────────────────────────────────────────────
const BLOCKS = [
  { title: 'Entender el negocio', time: 'Minuto 10 – 25', qs: [
    '¿Qué servicios ofreces actualmente?',

  ]},
  { title: 'Captación actual', time: 'Minuto 25 – 40', qs: [

  ]},
  { title: 'Marca personal y presencia digital', time: 'Minuto 40 – 55', qs: [
    '¿Qué redes sociales utilizas actualmente?',
    '¿Cuál utilizas con mayor frecuencia?',
    '¿Publicas contenido? ¿Con qué frecuencia?',
    '¿Qué tipo de contenido compartes?',
    '¿Qué publicaciones suelen funcionar mejor?',
    '¿Qué publicaciones suelen funcionar peor?',
    '¿Te sientes cómoda grabando videos?',
    '¿Qué es lo que más te cuesta de crear contenido?',
    '¿Qué te gustaría comunicar que actualmente no estás comunicando?',
    'Si alguien entra hoy a tus redes, ¿qué impresión crees que se lleva de ti?'
  ]},
  { title: 'Inteligencia Artificial y herramientas', time: 'Minuto 55 – 65', qs: [
    '¿Has utilizado ChatGPT alguna vez? ¿Pagas la suscripción o lo usas gratis?',
    '¿Para qué lo has utilizado?',
    '¿Qué herramientas digitales utilizas normalmente?',
    '¿Qué tareas te consumen más tiempo?',
    '¿Qué parte de tu trabajo te gustaría simplificar?',
    '¿Qué procesos te gustaría automatizar o hacer más rápidos?',
    { q: '¿Cuál sería tu nivel actual de conocimiento en IA del 1 al 10?', scale: true }
  ]},
  { title: 'Objetivos', time: 'Minuto 65 – 80', qs: [
    '¿Dónde te gustaría estar dentro de 3 meses?',
    '¿Dónde te gustaría estar dentro de 6 meses?',
    '¿Dónde te gustaría estar dentro de 12 meses?',
    '¿Cuántos clientes te gustaría tener al mes?',
    '¿Cuántas consultas te gustaría generar?',
    '¿Qué tendría que pasar para que dijeras: "Este acompañamiento valió completamente la pena"?',
    '¿Cuál es tu principal prioridad profesional en este momento?',
    '¿Cuál es el principal obstáculo que sientes que te está frenando?'
  ]}
];

const TAREA_LABELS = [
  'Perfil de Instagram',
  'Perfil de LinkedIn (si tiene)',
  'Página web (si existe)',
  'WhatsApp Business',
  'Materiales de presentación',
  'Servicios actuales y precios',
  'Ejemplos de contenido previo'
];

const TOTAL_SCREENS = 1 + BLOCKS.length + 2; // 8

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let S = {
  step: 0,
  answers: {},
  tarea: {},
  copied: false,
  sending: false,
  sent: false
};

function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    S.step    = raw.step    || 0;
    S.answers = raw.answers || {};
    S.tarea   = raw.tarea   || {};
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      step: S.step, answers: S.answers, tarea: S.tarea
    }));
  } catch(e) {}
}

// ─── UTILIDADES ───────────────────────────────────────────────────────────────
function qid(b, i) { return 'b' + b + '_q' + i; }

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function buildSummary() {
  const lines = [];
  lines.push('DIAGNÓSTICO ESTRATÉGICO — Sesión 1');
  lines.push('Daniela Harrington · Somos2os Studio');
  lines.push('Fecha: ' + new Date().toLocaleDateString('es-ES'));
  lines.push('');
  BLOCKS.forEach((blk, bi) => {
    lines.push('— ' + blk.title.toUpperCase() + ' (' + blk.time + ') —');
    blk.qs.forEach((q, i) => {
      const text = (typeof q === 'string') ? q : q.q;
      const id   = qid(bi, i);
      const a    = S.answers[id];
      lines.push(text);
      lines.push('   ' + (a !== undefined && a !== '' ? a : '(sin respuesta)'));
      lines.push('');
    });
  });
  lines.push('— MATERIALES PARA AUDITORÍA —');
  TAREA_LABELS.forEach((l, i) => lines.push((S.tarea[i] ? '[x] ' : '[ ] ') + l));
  return lines.join('\n');
}

// ─── ACCIONES GLOBALES (accesibles desde onclick inline) ──────────────────────
window.go = function(step) {
  S.step = Math.max(0, Math.min(TOTAL_SCREENS - 1, step));
  saveState();
  render();
  try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e) { window.scrollTo(0, 0); }
};

window.updateAnswer = function(id, val) {
  S.answers[id] = val;
  saveState();
};

window.updateScale = function(id, val) {
  S.answers[id] = Number(val);
  saveState();
  const display = document.getElementById('scale-display-' + id);
  if (display) display.textContent = val;
};

window.toggleTarea = function(i) {
  S.tarea[i] = !S.tarea[i];
  saveState();
  const container = document.getElementById('tarea-list');
  if (container) container.innerHTML = buildTareaItemsHTML();
};

window.sendEmail = async function() {
  const btn = document.getElementById('send-btn');

  // 1. Guardar en Supabase si está configurado
  if (SUPABASE_URL !== 'TU_SUPABASE_URL' && SUPABASE_KEY !== 'TU_SUPABASE_ANON_KEY') {
    if (btn) { btn.textContent = 'Guardando…'; btn.disabled = true; }
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/diagnosticos', {
        method: 'POST',
        headers: {
          'apikey':        SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type':  'application/json',
          'Prefer':        'return=minimal'
        },
        body: JSON.stringify({
          cliente: 'Daniela Harrington',
          fecha:   new Date().toISOString(),
          answers: S.answers,
          tarea:   S.tarea,
          resumen: buildSummary()
        })
      });
      if (res.ok) {
        S.sent = true;
        if (btn) btn.textContent = '✓ Guardado en Somos2os';
      } else {
        console.error('Supabase error:', res.status, await res.text());
        if (btn) btn.textContent = '✉ Enviar mis respuestas a Somos2os';
      }
    } catch(e) {
      console.error('Error al conectar con Supabase:', e);
      if (btn) btn.textContent = '✉ Enviar mis respuestas a Somos2os';
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  // 2. Abrir cliente de correo con el resumen completo
  const mailto = 'mailto:' + encodeURIComponent(COACH_EMAIL)
    + '?subject=' + encodeURIComponent('Diagnóstico Estratégico — Daniela Harrington')
    + '&body='    + encodeURIComponent(buildSummary());
  window.location.href = mailto;
};

window.copyAnswers = function() {
  const text = buildSummary();
  const done = () => {
    S.copied = true;
    const btn = document.getElementById('copy-btn');
    if (btn) btn.textContent = '✓ ¡Copiado!';
    setTimeout(() => {
      S.copied = false;
      if (btn) btn.textContent = 'Copiar respuestas';
    }, 2200);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(done);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    done();
  }
};

window.printAnswers = function() {
  const win = window.open('', '_blank');
  if (!win) return;
  const body = esc(buildSummary());
  win.document.write(
    '<html><head><title>Diagnóstico Estratégico — Daniela Harrington</title>'
    + '<style>body{font-family:-apple-system,Segoe UI,sans-serif;color:#231D3A;max-width:760px;margin:40px auto;padding:0 28px;line-height:1.55;} '
    + 'h1{font-size:24px;border-bottom:3px solid #7A2C9E;padding-bottom:10px;} '
    + 'pre{white-space:pre-wrap;font-family:inherit;font-size:14.5px;}</style></head>'
    + '<body><h1>Diagnóstico Estratégico · Sesión 1</h1><pre>' + body + '</pre></body></html>'
  );
  win.document.close();
  setTimeout(() => { try { win.print(); } catch(e) {} }, 350);
};

// ─── CONSTRUCTORES HTML ───────────────────────────────────────────────────────

function buildTareaItemsHTML() {
  return TAREA_LABELS.map((label, i) => {
    const on          = !!S.tarea[i];
    const borderColor = on ? '#7A2C9E'   : '#E6E3F2';
    const bg          = on ? 'linear-gradient(135deg,rgba(46,114,216,.07),rgba(122,44,158,.07))' : '#FBFAFE';
    const boxBorder   = on ? '#7A2C9E'   : '#CFC9E3';
    const boxBg       = on ? 'linear-gradient(135deg,#2E72D8,#7A2C9E)' : '#fff';
    const check       = on ? '✓' : '';
    return `
      <div onclick="toggleTarea(${i})" style="display:flex;align-items:center;gap:14px;cursor:pointer;padding:15px 18px;border-radius:14px;border:1.5px solid ${borderColor};background:${bg};transition:all .18s ease;">
        <div style="flex:none;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:2px solid ${boxBorder};background:${boxBg};color:#fff;font-size:15px;font-weight:800;">${check}</div>
        <span style="font-size:16px;font-weight:600;color:#2C2742;">${esc(label)}</span>
      </div>`;
  }).join('');
}

  <div class="form-card" style="width:100%;max-width:680px;background:#fff;border-radius:26px;padding:48px 44px;box-shadow:0 28px 70px -38px rgba(60,40,120,.45);border:1px solid #ECE9F7;">
    <div style="display:inline-flex;align-items:center;gap:8px;padding:7px 15px;border-radius:99px;background:linear-gradient(135deg,rgba(46,114,216,.12),rgba(122,44,158,.12));color:#5A2E9E;font-size:12.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:22px;white-space:nowrap;">Guía de Sesión · Sesión 1</div>
    <h1 class="form-h1" style="font-family:'Sora',sans-serif;font-size:42px;line-height:1.08;font-weight:700;margin:0 0 14px;letter-spacing:-.02em;background:linear-gradient(120deg,#2E72D8,#6A38B0 55%,#7A2C9E);-webkit-background-clip:text;background-clip:text;color:transparent;">Diagnóstico Estratégico</h1>
    <p class="form-sub" style="font-size:15px;color:#6B6680;margin:0 0 30px;font-weight:600;">90 minutos · Daniela Harrington</p>

    <div style="background:#F7F6FC;border:1px solid #ECE9F7;border-left:4px solid #7A2C9E;border-radius:14px;padding:20px 22px;margin-bottom:26px;">

    </div>

    <p class="form-body" style="font-size:16px;line-height:1.65;color:#46415C;margin:0 0 14px;">Daniela, esta primera sesión es principalmente para conocerte, entender tu situación actual y descubrir dónde están las mayores oportunidades de crecimiento. La idea es salir con claridad sobre dónde estás, hacia dónde quieres ir y qué debemos construir durante los próximos 90 días.</p>
    <p class="form-body" style="font-size:16px;line-height:1.65;color:#46415C;margin:0 0 34px;">No te preocupes si no tienes todas las respuestas perfectas. Lo importante es entender tu situación actual. Te haremos una serie de preguntas para conocerte mucho más y dirigir las siguientes sesiones hacia donde te sientas más cómoda.</p>

    <button onclick="go(1)" class="btn-primary" style="width:100%;padding:17px 24px;border-radius:14px;font-size:17px;letter-spacing:.01em;box-shadow:0 16px 30px -12px rgba(90,52,160,.6);">Comenzar diagnóstico →</button>
    <p style="text-align:center;font-size:13px;color:#9A95AD;margin:16px 0 0;">Tus respuestas se guardan automáticamente en este dispositivo.</p>
  </div>`;

function buildBlockHTML(blk, bi) {
  const questionsHTML = blk.qs.map((raw, i) => {
    const isScale = (typeof raw === 'object') && raw.scale;
    const text    = (typeof raw === 'string') ? raw : raw.q;
    const id      = qid(bi, i);
    const stored  = S.answers[id];

    let inputHTML;
    if (isScale) {
      const val = (stored === undefined || stored === '') ? 5 : Number(stored);
      inputHTML = `
      <div class="q-scale" style="margin-left:43px;background:#F7F6FC;border:1px solid #ECE9F7;border-radius:16px;padding:20px 22px;">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;">
          <span style="font-size:13px;font-weight:600;color:#9A95AD;">Nada de conocimiento</span>
          <span id="scale-display-${id}" style="font-family:'Sora',sans-serif;font-size:36px;font-weight:800;line-height:1;background:linear-gradient(120deg,#2E72D8,#7A2C9E);-webkit-background-clip:text;background-clip:text;color:transparent;">${val}</span>
          <span style="font-size:13px;font-weight:600;color:#9A95AD;">Experta</span>
        </div>
        <input type="range" min="1" max="10" step="1" value="${val}" oninput="updateScale('${id}', this.value)">
        <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;font-weight:600;color:#C2BDD3;">
          <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
        </div>
      </div>`;
    } else {
      const val = esc(stored || '');
      inputHTML = `<textarea class="q-textarea" rows="2" placeholder="Escribe tu respuesta…" oninput="updateAnswer('${id}', this.value)">${val}</textarea>`;
    }

    return `
    <div style="display:flex;flex-direction:column;gap:11px;">
      <div style="display:flex;align-items:flex-start;gap:13px;">
        <div style="flex:none;width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#2E72D8,#7A2C9E);color:#fff;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;">${i + 1}</div>
        <label class="form-label" style="font-size:17px;font-weight:600;line-height:1.4;color:#2C2742;padding-top:3px;">${esc(text)}</label>
      </div>
      ${inputHTML}
    </div>`;
  }).join('');

  return `
  <div class="form-card" style="width:100%;max-width:780px;background:#fff;border-radius:26px;padding:42px 40px 34px;box-shadow:0 28px 70px -38px rgba(60,40,120,.4);border:1px solid #ECE9F7;">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px;">
      <div style="font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,#2E72D8,#7A2C9E);padding:5px 12px;border-radius:99px;letter-spacing:.03em;white-space:nowrap;">${esc(blk.time)}</div>
    </div>
    <h2 class="form-h2" style="font-family:'Sora',sans-serif;font-size:30px;font-weight:700;letter-spacing:-.02em;margin:8px 0 28px;color:#231D3A;">${esc(blk.title)}</h2>
    <div style="display:flex;flex-direction:column;gap:24px;">
      ${questionsHTML}
    </div>
    <div class="form-nav" style="display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:34px;padding-top:26px;border-top:1px solid #F0EEF8;">
      <button onclick="go(${S.step - 1})" class="btn-secondary">← Atrás</button>
      <button onclick="go(${S.step + 1})" class="btn-primary">Continuar →</button>
    </div>
  </div>`;
}

function buildTareaHTML() {
  return `
  <div class="form-card" style="width:100%;max-width:680px;background:#fff;border-radius:26px;padding:44px 40px 34px;box-shadow:0 28px 70px -38px rgba(60,40,120,.4);border:1px solid #ECE9F7;">
    <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:99px;background:linear-gradient(135deg,rgba(46,114,216,.12),rgba(122,44,158,.12));color:#5A2E9E;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:18px;white-space:nowrap;">Tarea final</div>
    <h2 class="form-h2" style="font-family:'Sora',sans-serif;font-size:29px;font-weight:700;letter-spacing:-.02em;margin:0 0 10px;color:#231D3A;">Materiales para tu auditoría</h2>
    <p class="form-body" style="font-size:16px;line-height:1.6;color:#5A5470;margin:0 0 28px;">Para realizar la auditoría completa antes de crear tu Plan Estratégico de 90 Días, marca lo que puedas compartir:</p>
    <div id="tarea-list" style="display:flex;flex-direction:column;gap:12px;">
      ${buildTareaItemsHTML()}
    </div>
    <div class="form-nav" style="display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:32px;padding-top:24px;border-top:1px solid #F0EEF8;">
      <button onclick="go(${S.step - 1})" class="btn-secondary">← Atrás</button>
      <button onclick="go(${S.step + 1})" class="btn-primary">Finalizar →</button>
    </div>
  </div>`;
}

function buildCloseHTML() {
  const sendLabel = S.sent ? '✓ Respuestas guardadas en Somos2os' : '✉ Enviar mis respuestas a Somos2os';
  return `
  <div class="form-card" style="width:100%;max-width:660px;background:#fff;border-radius:26px;padding:52px 44px;box-shadow:0 28px 70px -38px rgba(60,40,120,.45);border:1px solid #ECE9F7;text-align:center;">
    <div style="width:76px;height:76px;border-radius:50%;margin:0 auto 26px;background:linear-gradient(135deg,#2E72D8,#7A2C9E);display:flex;align-items:center;justify-content:center;box-shadow:0 18px 34px -14px rgba(90,52,160,.6);">
      <span style="color:#fff;font-size:38px;font-weight:800;line-height:1;">✓</span>
    </div>
    <h2 class="form-h2-close" style="font-family:'Sora',sans-serif;font-size:32px;font-weight:700;letter-spacing:-.02em;margin:0 0 16px;color:#231D3A;">¡Gracias, Daniela!</h2>
    <p class="form-body" style="font-size:16.5px;line-height:1.65;color:#46415C;margin:0 auto 14px;max-width:520px;">Perfecto. Con toda esta información vamos a trabajar en tu <strong>Plan Estratégico Personalizado de 90 Días</strong>: analizaremos todo lo que compartiste, identificaremos las mayores oportunidades de crecimiento y diseñaremos una estrategia adaptada específicamente a tu situación.</p>
    <p class="form-body" style="font-size:16.5px;line-height:1.65;color:#46415C;margin:0 auto 34px;max-width:520px;">En nuestra próxima sesión te presentaremos el plan completo con las prioridades, el posicionamiento recomendado, la estrategia de contenido, las oportunidades comerciales y los pasos concretos que vamos a implementar juntos.</p>

    <button id="send-btn" onclick="sendEmail()" class="btn-primary" style="width:100%;padding:17px 24px;border-radius:14px;font-size:16.5px;margin-bottom:12px;">${sendLabel}</button>
    <div class="close-btns" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button id="copy-btn" onclick="copyAnswers()" class="btn-secondary" style="color:#5A2E9E;">${S.copied ? '✓ ¡Copiado!' : 'Copiar respuestas'}</button>
      <button onclick="printAnswers()" class="btn-secondary">Guardar PDF</button>
      <button onclick="go(${S.step - 1})" class="btn-secondary">← Revisar</button>
    </div>
    <p style="font-size:13px;color:#9A95AD;margin:24px 0 0;">Al enviar, se abrirá tu correo con todas las respuestas ya escritas. Tus respuestas también quedan guardadas en este dispositivo.</p>
    <div style="margin-top:30px;padding-top:24px;border-top:1px solid #F0EEF8;">
      <img src="assets/logo-somos2os.png" alt="Somos2os Studio" style="height:30px;width:auto;opacity:.85;">
    </div>
  </div>`;
}

// ─── RENDER PRINCIPAL ─────────────────────────────────────────────────────────
function render() {
  const step      = S.step;
  const isIntro   = step === 0;
  const isClose   = step === TOTAL_SCREENS - 1;
  const isTarea   = step === TOTAL_SCREENS - 2;
  const isBlock   = !isIntro && !isClose && !isTarea;
  const showProg  = !isIntro && !isClose;
  const blockIdx  = step - 1;
  const blk       = isBlock ? BLOCKS[blockIdx] : null;
  const pct       = Math.round((step / (TOTAL_SCREENS - 1)) * 100);
  const stepLabel = isBlock
    ? `Bloque ${blockIdx + 1} de ${BLOCKS.length}`
    : isTarea ? 'Tarea final' : '';

  let html = `
  <div class="form-wrap" style="min-height:100vh;width:100%;max-width:100vw;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;
    background:
      radial-gradient(900px 520px at 12% -8%, rgba(46,114,216,.16), transparent 60%),
      radial-gradient(900px 560px at 92% 6%, rgba(122,44,158,.16), transparent 60%),
      #F4F3FB;
    padding:32px 20px 64px;">

    <!-- Header con logo y etiqueta de paso -->
    <div class="form-header" style="width:100%;max-width:780px;display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
      <img class="form-logo" src="assets/logo-somos2os.png" alt="Somos2os Studio" style="height:34px;width:auto;object-fit:contain;">
      ${showProg ? `<div class="form-sub" style="font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#7A2C9E;">${esc(stepLabel)}</div>` : ''}
    </div>

    <!-- Barra de progreso -->
    ${showProg ? `
    <div style="width:100%;max-width:780px;margin-bottom:24px;">
      <div style="height:8px;width:100%;background:#E5E1F2;border-radius:99px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#2E72D8,#5A45C4 55%,#7A2C9E);border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1);"></div>
      </div>
    </div>` : ''}
  `;

  if      (isIntro) html += buildIntroHTML();
  else if (isBlock) html += buildBlockHTML(blk, blockIdx);
  else if (isTarea) html += buildTareaHTML();
  else if (isClose) html += buildCloseHTML();

  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

// ─── INICIO ───────────────────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
</html>
